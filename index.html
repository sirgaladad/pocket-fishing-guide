                    <button
                      className={`fb-sentiment-btn ${sentiment === 'bad' ? 'active bad' : ''}`}
                      onClick={() => applySentimentDefaults('bad')}
                    >
                      👎 Bad
                    </button>
                    <button
                      className={`fb-sentiment-btn ${sentiment === 'other' ? 'active other' : ''}`}
                      onClick={() => applySentimentDefaults('other')}
                    >
                      😐 Other
                    </button>
                  </div>

                  <div className="fb-label">Rating (optional)</div>
                  <div className="fb-scale">
                    {[1, 2, 3, 4, 5].map((n) => (
                      <button
                        key={n}
                        className={`fb-scale-btn ${score === n ? 'active' : ''}`}
                        onClick={() => applyScoreDefaults(n)}
                      >
                        {n}
                      </button>
                    ))}
                  </div>

                  <textarea
                    className="fb-text"
                    placeholder={problemPlaceholder}
                    value={problem}
                    onChange={(e) => setProblem(e.target.value)}
                    rows={3}
                  />

                  <details className="fb-advanced">
                    <summary>More context (optional)</summary>
                    <div className="fb-advanced-body">
                      <div className="fb-grid">
                        <div>
                          <div className="fb-label">Priority</div>
                          <select
                            className="fb-select"
                            value={priority}
                            onChange={(e) => setPriority(e.target.value)}
                          >
                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>
                            <option>Critical</option>
                          </select>
                        </div>
                        <div>
                          <div className="fb-label">Journey Stage</div>
                          <select
                            className="fb-select"
                            value={journey}
                            onChange={(e) => setJourney(e.target.value)}
                          >
                            {journeyStages.map((step) => (
                              <option key={step}>{step}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                      <textarea
                        className="fb-text"
                        placeholder="What were you trying to do?"
                        value={goal}
                        onChange={(e) => setGoal(e.target.value)}
                        rows={2}
                      />
                      <textarea
                        className="fb-text"
                        placeholder="What should have happened?"
                        value={outcome}
                        onChange={(e) => setOutcome(e.target.value)}
                        rows={2}
                      />
                      <input
                        className="fb-text"
                        placeholder="Optional follow-up email or handle"
                        value={contact}
                        onChange={(e) => setContact(e.target.value)}
                        style={{ minHeight: 'auto', resize: 'none' }}
                      />
                    </div>
                  </details>

                  <p className="fb-hint">
                    Best practice: include one specific example (screen + action
                    + result). That helps us ship fixes faster.
                  </p>
                  <div className="fb-actions">
                    <button
                      className="fb-submit"
                      onClick={() => setOpen(false)}
                      style={{
                        background: 'var(--bg3)',
                        color: 'var(--text2)',
                      }}
                    >
                      Cancel
                    </button>
                    <button
                      className="fb-submit primary"
                      onClick={submit}
                      disabled={!cat || !problem.trim()}
                    >
                      Send Feedback
                    </button>
                  </div>
                </div>
              </div>
            )}
            {toast && (
              <div className="fb-toast">✅ Thanks for your feedback!</div>
            )}
          </>
        );
      }

      function DashboardTab({
        usgs,
        forecast,
        water,
        species,
        loading,
      }) {
        const [stationModalOpen, setStationModalOpen] = useState(false);
        if (loading) return <Loading />;
        const w = WATERS[water];
        const temp = usgs?.temp ?? null;
        const hasTemp = Number.isFinite(temp);
        const hasFlow = Number.isFinite(usgs?.flow);
        const hasGage = Number.isFinite(usgs?.gage);
        const phase = getPhase(temp, species);
        const phaseIdx = getPhaseIndex(temp, species);
        const phaseList = CRAPPIE_IDS.has(species) ? CR_PHASES : WB_PHASES;
        const spawnTrigger = getSpeciesSpawnTrigger(species);
        const scoutTemp = getSpeciesScoutTemp(species);
        const tempC = hasTemp ? (((temp - 32) * 5) / 9).toFixed(1) : null;
        const triggerDistValue = (hasTemp && Number.isFinite(spawnTrigger))
          ? Math.max(0, spawnTrigger - temp)
          : null;
        const triggerDist = triggerDistValue !== null ? triggerDistValue.toFixed(1) : null;
        const daysEst =
          Number.isFinite(usgs?.tempTrend7) &&
          usgs.tempTrend7 > 0 &&
          Number.isFinite(triggerDistValue) &&
          triggerDistValue > 0
            ? Math.ceil((triggerDistValue / usgs.tempTrend7) * 7)
            : null;

        const trendCls = (v) => (v > 0 ? 'up' : v < 0 ? 'down' : 'flat');
        const trendArr = (v) =>
          v > 0 ? '\u25B2' : v < 0 ? '\u25BC' : '\u2192';
        const fmtTrend = (v) =>
          Number.isFinite(v) ? `${v > 0 ? '+' : ''}${v}\u00B0` : '';
        const fmtSigned = (v, suffix = '') =>
          Number.isFinite(v) ? `${v > 0 ? '+' : ''}${v}${suffix}` : 'n/a';
        const stationReadings = usgs?.stationReadings || [];
        const hasMultiStations = stationReadings.length > 1;
        const stationTemps = stationReadings.filter((s) => Number.isFinite(s.temp));
        const warmestCandidate =
          stationTemps.length > 0
            ? [...stationTemps].sort((a, b) => b.temp - a.temp)[0]
            : null;
        const primaryStationId =
          usgs?.summaryStationId ||
          usgs?.id ||
          stationReadings.find((s) => s.primary)?.id ||
          stationReadings[0]?.id ||
          null;
        const warmestStation =
          warmestCandidate && warmestCandidate.id !== primaryStationId
            ? warmestCandidate
            : null;
        const warmestDelta =
          warmestStation && Number.isFinite(temp)
            ? +(warmestStation.temp - temp).toFixed(1)
            : null;

        // Quick Glance verdict — computed by the signal engine
        const dayPeriods0 = (forecast || [])
          .filter((p) => p.isDaytime)
          .slice(0, 7);
        const bestWindowDay = dayPeriods0.reduce((best, p) => {
          const r = rateFishing(p);
          return !best || r.label === 'Best'
            ? { name: p.name, rating: r }
            : best;
        }, null);
        const verdict = computeSignal(w.subtype || w.type, usgs, species, temp);

        // Spawn bar
        const minT = 40,
          maxT = CRAPPIE_IDS.has(species) ? 75 : 70;
        const pct = hasTemp
          ? Math.min(100, Math.max(0, ((temp - minT) / (maxT - minT)) * 100))
          : 0;
        const msPct = (t) => ((t - minT) / (maxT - minT)) * 100;

        const milestones =
          CRAPPIE_IDS.has(species)
            ? [
                { label: 'Move', temp: 48, color: '#ab47bc' },
                { label: 'Stage', temp: 55, color: '#e040fb' },
                { label: 'Bed Spawn', temp: 60, color: '#f44336' },
              ]
            : [
                { label: 'Staging', temp: 45, color: '#29b6f6' },
                { label: 'Spawn', temp: 50, color: '#ff6b35' },
                { label: 'Peak Run', temp: 55, color: '#f44336' },
              ];

        // Day forecasts for weather cards
        const dayPeriods = (forecast || [])
          .filter((p) => p.isDaytime)
          .slice(0, 4);
        const sourceMeta = WATER_LEVEL_SOURCES[water] || {
          provider: 'USGS/NWS',
          notes: '',
        };
        const sourceProvider = usgs?.levelProvider || sourceMeta.provider;
        const sourceUrl = usgs?.levelSourceUrl || sourceMeta.primaryUrl || null;
        const sourceStatus = usgs?.levelSourceStatus || null;
        const levelLabel = get7DayLevelLabel(water);
        const levelStatusLabel = getWaterLevelStatusLabel(water);
        const sourceBadge = getLevelSourceBadge(usgs?.levelProvider, water);
        const isTailwater = TAXONOMY.waterTypeMap[water] === 'tailwater';
        const genScheduleUrl = WATERS[water]?.generationScheduleUrl || null;
        const tempSourceLabel = usgs?.tempSourceLabel || 'No temperature feed';
        const tempIsEstimated = usgs?.tempSource === 'estimated';
        const gageTrend7 = usgs?.gageTrend7 ?? null;
        const flowTrend7 = usgs?.flowTrend7 ?? null;
        const gageStatus = !hasGage
          ? null
          : gageTrend7 === null
            ? {
                label: 'Monitoring',
                cls: 'good',
                note: 'Need more history for trend direction.',
              }
            : gageTrend7 > 1
              ? {
                  label: 'Rising',
                  cls: 'best',
                  note: 'Water level rose significantly over the last 7 days.',
                }
              : gageTrend7 < -1
                ? {
                    label: 'Falling',
                    cls: 'note',
                    note: 'Water level dropped significantly over the last 7 days.',
                  }
                : {
                    label: 'Stable',
                    cls: 'good',
                    note: 'Water level has remained relatively stable week-over-week.',
                  };
        const flowStatus = !hasFlow
          ? null
          : w.type === 'river'
            ? usgs.flow > 3000
              ? {
                  label: 'High Flow',
                  cls: 'note',
                  note: 'Strong current. Favor protected seams and prioritize safety.',
                }
              : usgs.flow < 300
                ? {
                    label: 'Low Flow',
                    cls: 'note',
                    note: 'Low current can make fish wary. Downsize and fish deeper holes.',
                  }
                : {
                    label: 'Fishable Flow',
                    cls: 'best',
                    note: 'Current is generally fishable for active feeding windows.',
                  }
            : usgs.flow > 2000
              ? {
                  label: 'Heavy Generation',
                  cls: 'note',
                  note: 'High release can reposition fish and increase current exposure.',
                }
              : usgs.flow < 200
                ? {
                    label: 'Minimal Generation',
                    cls: 'good',
                    note: 'Slack conditions. Focus on structure and bait concentrations.',
                  }
                : {
                    label: 'Moderate Generation',
                    cls: 'best',
                    note: 'Moderate flow often improves oxygen and feeding activity.',
                  };

        return (
          <>

            {/* QUICK GLANCE HERO */}
            {hasTemp && (
              <div className="hero-card">
                <div className="hero-verdict">
                  <div className={`hero-signal ${verdict.cls}`}>
                    {verdict.icon}
                  </div>
                  <div className="hero-headline">
                    {verdict.label === 'GO FISH!' ? (
                      <>
                        {verdict.label}{' '}
                        <span className="hero-hl">
                          {getSpeciesDisplayName(species)} spawn
                          temps reached!
                        </span>
                      </>
                    ) : verdict.label === 'SCOUT' ? (
                      <>
                        SCOUT MODE{' '}
                        <span className="hero-hl">
                          {triggerDist}
                          {'\u00B0'}F to{' '}
                          {CRAPPIE_IDS.has(species) ? 'bed spawn' : 'spawn'} trigger
                        </span>
                      </>
                    ) : verdict.label === 'SEASON' ? (
                      <>
                        SEASON GUIDE{' '}
                        <span className="hero-hl">
                          Check AGFC stocking schedule for{' '}
                          {getSpeciesDisplayName(species).toLowerCase()}
                        </span>
                      </>
                    ) : (
                      <>
                        {isSpeciesImplemented(species) ? (
                          <>
                            {TROUT_IDS.has(species) ? (
                              <>
                                HEADS UP{' '}
                                <span className="hero-hl">
                                  Approaching spawn temp for{' '}
                                  {getSpeciesDisplayName(species).toLowerCase()}
                                </span>
                              </>
                            ) : (
                              <>
                                HOLD TIGHT{' '}
                                <span className="hero-hl">
                                  Water still cold for{' '}
                                  {getSpeciesDisplayName(species).toLowerCase()}
                                </span>
                              </>
                            )}
                          </>
                        ) : (
                          <>
                            {getSpeciesDisplayName(species)}{' '}
                            <span className="hero-hl">
                              data coming soon
                            </span>
                          </>
                        )}
                      </>
                    )}
                  </div>
                </div>
                <div className="hero-summary">
                  {temp.toFixed(1)}
                  {'\u00B0'}F water{tempIsEstimated ? ' (estimated)' : ''}
                  {Number.isFinite(usgs?.tempTrend24)
                    ? `, ${usgs.tempTrend24 > 0 ? 'warming' : 'cooling'} ${Math.abs(usgs.tempTrend24)}\u00B0 in 24hr`
                    : ''}
                  {daysEst
                    ? `. ~${daysEst} days to ${CRAPPIE_IDS.has(species) ? 'bed spawn' : 'spawn'} trigger at current rate.`
                    : (Number.isFinite(spawnTrigger) && temp >= spawnTrigger)
                      ? '. Fish are moving!'
                      : '.'}
                  {bestWindowDay ? ` Best window: ${bestWindowDay.name}.` : ''}
                </div>
                <div className="hero-pills">
                  <div className="hero-pill">
                    {'\uD83C\uDF21\uFE0F'}{' '}
                    <span className="pill-val">
                      {temp.toFixed(1)}
                      {'\u00B0'}F{tempIsEstimated ? '*' : ''}
                    </span>
                  </div>
                  {hasFlow && (
                    <div className="hero-pill">
                      {'\uD83D\uDCA7'}{' '}
                      <span className="pill-val">
                        {usgs.flow.toLocaleString()}
                      </span>{' '}
                      cfs
                    </div>
                  )}
                  {hasGage && (
                    <div className="hero-pill">
                      {'\uD83D\uDCCF'}{' '}
                      <span className="pill-val">{usgs.gage.toFixed(2)}</span>{' '}
                      ft
                    </div>
                  )}
                  {isSpeciesImplemented(species) && (
                    <div
                      className="hero-pill"
                      style={{
                        borderColor: phase.color + '44',
                        color: phase.color,
                      }}
                    >
                      {phase.icon} <span className="pill-val">{phase.name}</span>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* DATA SOURCE STATUS */}
            <div className="card">
              <div className="card-title">
                {'\uD83D\uDD17'} Level & Flow Source{' '}
                <span
                  style={{
                    fontSize: 10,
                    fontWeight: 700,
                    padding: '1px 5px',
                    borderRadius: 3,
                    background: sourceBadge === 'USACE' ? 'var(--accent)' : '#5c9ed6',
                    color: '#fff',
                    marginLeft: 6,
                  }}
                >
                  {sourceBadge}
                </span>
              </div>
              <div
                style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.5 }}
              >
                Provider:{' '}
                <span style={{ color: 'var(--text)', fontWeight: 700 }}>
                  {sourceProvider}
                </span>
                {sourceStatus === 'ok' && (
                  <span
                    style={{
                      color: 'var(--green)',
                      marginLeft: 8,
                      fontWeight: 700,
                    }}
                  >
                    LIVE SNAPSHOT
                  </span>
                )}
                {sourceStatus === 'error' && (
                  <span
                    style={{
                      color: 'var(--orange)',
                      marginLeft: 8,
                      fontWeight: 700,
                    }}
                  >
                    SNAPSHOT ERROR
                  </span>
                )}
              </div>
              {sourceMeta.notes && (
                <div
                  style={{
                    fontSize: 11,
                    color: 'var(--text3)',
                    marginTop: 6,
                    lineHeight: 1.5,
                  }}
                >
                  {sourceMeta.notes}
                </div>
              )}
              {sourceUrl && (
                <a
                  href={sourceUrl}
                  target="_blank"
                  rel="noopener"
                  style={{
                    display: 'inline-block',
                    marginTop: 8,
                    fontSize: 12,
                    color: 'var(--accent)',
                    textDecoration: 'underline',
                  }}
                >
                  Open source feed
                </a>
              )}
            </div>

            {/* 2-COLUMN: WATER TEMP + SPAWN PHASE */}
            <div className="dash-grid">
              <div className="card">
                <div className="card-title">
                  {'\uD83C\uDF0A'} Water Temperature{' '}
                  <span className="temp-source-badge">{tempSourceLabel}</span>
                </div>
                {hasTemp ? (
                  <>
                    <div className="big-temp">
                      {temp.toFixed(1)}
                      <span className="unit">{'\u00B0'}F</span>
                    </div>
                    <div className="temp-c">
                      {tempC}
                      {'\u00B0'}C
                    </div>
                    {usgs?.tempSourceNote && (
                      <div className="temp-source-note">
                        {usgs.tempSourceNote}
                      </div>
                    )}
                    <div className="trend-row">
                      {Number.isFinite(usgs?.tempTrend24) && (
                        <div className={`trend ${trendCls(usgs.tempTrend24)}`}>
                          {trendArr(usgs.tempTrend24)}{' '}
                          {fmtTrend(usgs.tempTrend24)}{' '}
                          <span style={{ fontWeight: 400, fontSize: 10 }}>
                            /24hr
                          </span>
                        </div>
                      )}
                      {Number.isFinite(usgs?.tempTrend7) && (
                        <div className={`trend ${trendCls(usgs.tempTrend7)}`}>
                          {trendArr(usgs.tempTrend7)}{' '}
                          {fmtTrend(usgs.tempTrend7)}{' '}
                          <span style={{ fontWeight: 400, fontSize: 10 }}>
                            /7day
                          </span>
                        </div>
                      )}
                    </div>
                    <div className="gauge-meta">
                      {getStationLabel(w)}
                      {usgs.lastReading && (
                        <>
                          {' '}
                          {'\u00B7'}{' '}
                          {usgs.lastReading
                            .toISOString()
                            .slice(0, 16)
                            .replace('T', ' ')}{' '}
                          CST
                        </>
                      )}
                    </div>
                    {Number.isFinite(usgs?.tempSpread) && (
                      <div className="temp-source-note">
                        Cross-station spread: {usgs.tempSpread.toFixed(1)}°F
                        (cool-to-warm).
                      </div>
                    )}
                    {warmestStation && warmestDelta > 0 && (
                      <div className="warmest-callout">
                        <div className="warmest-callout-title">
                          🔥 Warmest spot now: {warmestStation.label}
                        </div>
                        <div className="warmest-callout-detail">
                          {`${warmestStation.temp.toFixed(1)}°F${
                            Number.isFinite(warmestDelta) && warmestDelta > 0
                              ? ` (+${warmestDelta.toFixed(1)}°F vs current station)`
                              : ''
                          }. New users can treat this as the spring spawn lead indicator and scout this area first.`}
                        </div>
                      </div>
                    )}
                    {hasMultiStations && (
                      <div className="gauge-actions">
                        <button
                          className="gauge-compare-btn"
                          onClick={() => setStationModalOpen(true)}
                        >
                          Compare {stationReadings.length} stations
                        </button>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="temp-empty">
                    No water temperature is available yet for this location.
                    <div className="temp-source-note">
                      Try Refresh or switch lakes; level and flow data may still
                      be available.
                    </div>
                    {hasFlow && (
                      <div className="flow-badge" style={{ marginTop: 6 }}>
                        {'\uD83D\uDCA7'} {usgs.flow.toLocaleString()} cfs
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="card">
                <div className="card-title">{'\uD83C\uDFA3'} Spawn Phase</div>
                {isSpeciesImplemented(species) ? (
                  <>
                    <div className="phase-icon">{phase.icon}</div>
                    <div className="phase-name" style={{ color: phase.color }}>
                      {phase.name}
                    </div>
                    <div className="phase-dots">
                      {phaseList.map((_, i) => (
                        <div
                          key={i}
                          className={`phase-dot ${i <= phaseIdx ? 'active' : ''}`}
                          style={i <= phaseIdx ? { background: phase.color } : {}}
                        ></div>
                      ))}
                    </div>
                    <div className="phase-desc">
                      {phase.short?.substring(0, 60)}
                      {phase.short?.length > 60 ? '...' : ''}
                    </div>
                    {triggerDist > 0 && (
                      <div className="phase-countdown">
                        <span>
                          {triggerDist}
                          {'\u00B0'}F to{' '}
                          {CRAPPIE_IDS.has(species) ? 'bed spawn' : 'spawn trigger'}
                        </span>
                        {daysEst && (
                          <>
                            {' '}
                            {'\u00B7'} ~{daysEst} days at current rate
                          </>
                        )}
                      </div>
                    )}
                  </>
                ) : (
                  <div style={{ fontSize: 13, color: 'var(--text3)', marginTop: 8 }}>
                    {'\uD83D\uDEA7'} Species data coming soon
                  </div>
                )}
              </div>
            </div>

            {/* SPAWN TEMPERATURE TRACKER — only shown for species with authored spawn data */}
            {hasTemp && isSpeciesImplemented(species) && (
              <div className="card">
                <div className="card-title">
                  {'\uD83D\uDCCA'} Spawn Temperature Tracker
                </div>
                <div className="spawn-labels">
                  <span>
                    {minT}
                    {'\u00B0'}F
                  </span>
                  {CRAPPIE_IDS.has(species) ? (
                    <>
                      <span>48{'\u00B0'} Move</span>
                      <span>55{'\u00B0'} Stage</span>
                      <span>60{'\u00B0'} Bed</span>
                      <span>68{'\u00B0'}</span>
                    </>
                  ) : (
                    <>
                      <span>45{'\u00B0'} Stage</span>
                      <span>50{'\u00B0'} Spawn</span>
                      <span>55{'\u00B0'} Peak</span>
                      <span>60{'\u00B0'}</span>
                    </>
                  )}
                  <span>
                    {maxT}
                    {'\u00B0'}F
                  </span>
                </div>
                <div className="spawn-bar">
                  <div
                    className="spawn-marker"
                    style={{ left: `${pct}%` }}
                  ></div>
                </div>
                <div className="spawn-milestones">
                  {milestones.map((m, i) => (
                    <div className="spawn-ms" key={i}>
                      <div
                        className="spawn-ms-label"
                        style={{ color: m.color }}
                      >
                        {m.label}
                      </div>
                      <div className="spawn-ms-dist">
                        {Math.max(0, m.temp - temp).toFixed(1)}
                        {'\u00B0'}F away
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 7-DAY WATER TEMP TREND */}
            {usgs?.temps7?.length > 0 && (
              <div className="card">
                <div className="card-title">
                  {'\uD83D\uDCC8'} 7-Day Water Temperature Trend
                </div>
                <div className="temp-chart">
                  {(() => {
                    const avgs = usgs.temps7.map((x) => x.avg);
                    const maxT2 = Math.max(...avgs);
                    const minT2 = Math.min(...avgs);
                    const range = maxT2 - minT2;
                    return usgs.temps7.map((t, i) => {
                      // Scale: lowest bar = 15%, highest = 95%, linear between
                      const pct =
                        range < 0.1 ? 50 : 15 + ((t.avg - minT2) / range) * 80;
                      const warmth =
                        range < 0.1 ? 0.5 : (t.avg - minT2) / range;
                      const isLast = i === usgs.temps7.length - 1;
                      const color = isLast
                        ? 'var(--spawn)'
                        : `hsl(${200 - warmth * 140}, 65%, 55%)`;
                      return (
                        <div className="temp-bar-wrap" key={i}>
                          <div
                            className="temp-bar-val"
                            style={
                              isLast
                                ? { color: 'var(--spawn)', fontWeight: 700 }
                                : {}
                            }
                          >
                            {t.avg}
                            {'\u00B0'}
                          </div>
                          <div className="temp-bar-area">
                            <div
                              className="temp-bar"
                              style={{ height: `${pct}%`, background: color }}
                            ></div>
                          </div>
                          <div className="temp-bar-label">{t.day}</div>
                        </div>
                      );
                    });
                  })()}
                </div>
                {Number.isFinite(usgs?.tempTrend7) && (
                  <div
                    className={`trend-analysis ${usgs.tempTrend7 < 0 ? 'cooling' : ''}`}
                  >
                    {usgs.tempTrend7 > 0
                      ? '\u25B2'
                      : usgs.tempTrend7 < 0
                        ? '\u25BC'
                        : '\u2192'}{' '}
                    {usgs.tempTrend7 > 0
                      ? 'Warming'
                      : usgs.tempTrend7 < 0
                        ? 'Cooling'
                        : 'Stable'}{' '}
                    trend: {fmtTrend(usgs.tempTrend7)} over 7 days.{' '}
                    {usgs.tempTrend7 > 0
                      ? 'Water is moving toward spawn trigger temperature.'
                      : usgs.tempTrend7 < 0
                        ? 'Water cooling \u2014 spawn activity may slow.'
                        : 'Water temperature has been steady over the past week.'}
                  </div>
                )}
              </div>
            )}

            {/* 7-DAY GAGE HEIGHT TREND */}
            <div className="card">
              <div className="card-title">
                {'\uD83D\uDCCF'} {levelLabel} (Gage Height) Trend
              </div>
              {usgs?.gages7?.length > 0 ? (
                <>
                  <div className="temp-chart">
                    {(() => {
                      const avgs = usgs.gages7.map((x) => x.avg);
                      const maxG = Math.max(...avgs);
                      const minG = Math.min(...avgs);
                      const range = maxG - minG;
                      return usgs.gages7.map((g, i) => {
                        const pct =
                          range < 0.05
                            ? 50
                            : 15 + ((g.avg - minG) / range) * 80;
                        const isLast = i === usgs.gages7.length - 1;
                        return (
                          <div className="temp-bar-wrap" key={i}>
                            <div
                              className="temp-bar-val"
                              style={
                                isLast
                                  ? { color: 'var(--accent)', fontWeight: 700 }
                                  : {}
                              }
                            >
                              {Number.isFinite(g.avg)
                                ? `${g.avg.toFixed(2)} ft`
                                : 'n/a'}
                            </div>
                            <div className="temp-bar-area">
                              <div
                                className="temp-bar"
                                style={{
                                  height: `${pct}%`,
                                  background: isLast
                                    ? 'var(--accent)'
                                    : '#5c9ed6',
                                }}
                              ></div>
                            </div>
                            <div className="temp-bar-label">{g.day}</div>
                          </div>
                        );
                      });
                    })()}
                  </div>
                  {gageStatus && (
                    <div
                      className={`fw-card ${gageStatus.cls}`}
                      style={{ marginTop: 10 }}
                    >
                      <div className="fw-card-title">
                        {'\uD83E\uDDED'} {levelStatusLabel}: {gageStatus.label}
                      </div>
                      <div className="fw-card-body">
                        {Number.isFinite(usgs?.currentPowerPool) ? (
                          <>
                            Current power pool:{' '}
                            {usgs.currentPowerPool.toFixed(2)} ft. Top flood
                            pool:{' '}
                            {Number.isFinite(usgs?.topFloodPool)
                              ? `${usgs.topFloodPool.toFixed(2)} ft`
                              : 'n/a'}
                            .{' '}
                            {Number.isFinite(usgs?.feetBelowFloodPool)
                              ? `${usgs.feetBelowFloodPool.toFixed(2)} ft below flood pool.`
                              : ''}{' '}
                          </>
                        ) : (
                          <>
                            Current level:{' '}
                            {Number.isFinite(usgs?.gage)
                              ? `${usgs.gage.toFixed(2)} ft.`
                              : 'n/a'}{' '}
                          </>
                        )}
                        24hr {fmtSigned(usgs.gageTrend24, ' ft')}, 7day{' '}
                        {fmtSigned(usgs.gageTrend7, ' ft')}. {gageStatus.note}
                      </div>
                    </div>
                  )}
                </>
              ) : (
                <div className="fw-card note">
                  <div className="fw-card-title">
                    {'\u26A0'} {levelStatusLabel}: Data Unavailable
                  </div>
                  <div className="fw-card-body">
                    This USGS gauge currently has no gage-height time series for
                    the selected period. Try another water body or check the
                    USGS station page.
                  </div>
                </div>
              )}
            </div>

            {/* 7-DAY FLOW TREND */}
            <div className="card">
              <div className="card-title">
                {'\uD83D\uDCA7'} {isTailwater ? 'Trout Flow — 7-Day Trend (Total Release, cfs)' : '7-Day Flow Trend'}
              </div>
              {usgs?.flows7?.length > 0 ? (
                <>
                  <div className="temp-chart">
                    {(() => {
                      const avgs = usgs.flows7.map((x) => x.avg);
                      const maxF = Math.max(...avgs);
                      const minF = Math.min(...avgs);
                      const range = maxF - minF;
                      return usgs.flows7.map((f, i) => {
                        const pct =
                          range < 50 ? 50 : 15 + ((f.avg - minF) / range) * 80;
                        const isLast = i === usgs.flows7.length - 1;
                        return (
                          <div className="temp-bar-wrap" key={i}>
                            <div
                              className="temp-bar-val"
                              style={
                                isLast
                                  ? { color: 'var(--green)', fontWeight: 700 }
                                  : {}
                              }
                            >
                              {Number.isFinite(f.avg)
                                ? f.avg.toLocaleString()
                                : 'n/a'}
                            </div>
                            <div className="temp-bar-area">
                              <div
                                className="temp-bar"
                                style={{
                                  height: `${pct}%`,
                                  background: isLast
                                    ? 'var(--green)'
                                    : '#72b58a',
                                }}
                              ></div>
                            </div>
                            <div className="temp-bar-label">{f.day}</div>
                          </div>
                        );
                      });
                    })()}
                  </div>
                  {flowStatus && (
                    <div
                      className={`fw-card ${flowStatus.cls}`}
                      style={{ marginTop: 10 }}
                    >
                      <div className="fw-card-title">
                        {'\uD83C\uDF0A'} {isTailwater ? 'Trout Flow' : 'Flow'} Status: {flowStatus.label}
                      </div>
                      <div className="fw-card-body">
                        {isTailwater ? 'Trout Flow (Total Release)' : 'Current flow'}:{' '}
                        {usgs.flow.toLocaleString()} cfs. 24hr{' '}
                        {fmtSigned(usgs.flowTrend24, ' cfs')}, 7day{' '}
                        {fmtSigned(usgs.flowTrend7, ' cfs')}. {flowStatus.note}
                      </div>
                    </div>
                  )}
                  {isTailwater && genScheduleUrl && (
                    <div
                      style={{
                        marginTop: 10,
                        padding: '6px 10px',
                        background: 'var(--card-bg)',
                        border: '1px solid var(--border)',
                        borderRadius: 6,
                        fontSize: 12,
                      }}
                    >
                      {'\uD83D\uDCC5'}{' '}
                      <a
                        href={genScheduleUrl}
                        target="_blank"
                        rel="noopener"
                        style={{ color: 'var(--accent)', fontWeight: 600 }}
                      >
                        Generation Schedule
                      </a>
                      <span
                        style={{
                          color: 'var(--text3)',
                          marginLeft: 6,
                          fontSize: 11,
                        }}
                      >
                        — Operational schedule may change
                      </span>
                    </div>
                  )}
                </>
              ) : (
                <div className="fw-card note">
                  <div className="fw-card-title">
                    {'\u26A0'} {isTailwater ? 'Trout Flow' : 'Flow'} Status: Data Unavailable
                  </div>
                  <div className="fw-card-body">
                    {isTailwater
                      ? 'No flow time series available for this tailwater. Check USACE or try refreshing.'
                      : 'This USGS gauge currently has no flow time series for the selected period. Try another water body or check the USGS station page.'}
                  </div>
                  {isTailwater && genScheduleUrl && (
                    <div style={{ marginTop: 8 }}>
                      {'\uD83D\uDCC5'}{' '}
                      <a
                        href={genScheduleUrl}
                        target="_blank"
                        rel="noopener"
                        style={{ color: 'var(--accent)', fontWeight: 600, fontSize: 12 }}
                      >
                        Generation Schedule
                      </a>
                      <span style={{ color: 'var(--text3)', marginLeft: 6, fontSize: 11 }}>
                        — Operational schedule may change
                      </span>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* WEATHER OUTLOOK */}
            {dayPeriods.length > 0 && (
              <div className="wx-cards">
                {dayPeriods.map((p, i) => (
                  <div className="wx-card" key={i}>
                    <div className="day">{p.name}</div>
                    <div className="icon">{getWxIcon(p.shortForecast)}</div>
                    <div className="hi" style={{ color: 'var(--spawn)' }}>
                      {p.temperature}
                      {'\u00B0'}
                    </div>
                    <div className="wind">
                      {p.windSpeed} {p.windDirection}
                    </div>
                    <div className="desc">{p.shortForecast}</div>
                  </div>
                ))}
              </div>
            )}

            {stationModalOpen && (
              <div
                className="station-overlay"
                onClick={() => setStationModalOpen(false)}
              >
                <div
                  className="station-modal"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="station-head">
                    <h3>USGS Station Comparison</h3>
                    <button
                      className="station-close"
                      onClick={() => setStationModalOpen(false)}
                    >
                      ×
                    </button>
                  </div>
                  <div className="station-note">
                    Compare station-specific readings for {w.name}. This helps
                    explain location differences like cooler dam water versus
                    warmer upstream sections.
                  </div>
                  {[...stationReadings]
                    .sort((a, b) => {
                      const aHas = Number.isFinite(a.temp);
                      const bHas = Number.isFinite(b.temp);
                      if (aHas && bHas) return b.temp - a.temp;
                      if (aHas) return -1;
                      if (bHas) return 1;
                      return 0;
                    })
                    .map((s) => {
                    const delta =
                      Number.isFinite(s.temp) && Number.isFinite(temp)
                        ? +(s.temp - temp).toFixed(1)
                        : null;
                    const isWarmest = warmestStation && s.id === warmestStation.id;
                    return (
                      <div
                        className={`station-item ${s.primary ? 'primary' : ''} ${isWarmest ? 'warmest' : ''}`}
                        key={s.id}
                      >
                        <div className="station-item-head">
                          <div className="station-item-name">
                            {s.label} · #{s.id}
                          </div>
                          {isWarmest && (
                            <span className="station-badge warmest">WARMEST</span>
                          )}
                          {s.summary && (
                            <span className="station-badge">DASHBOARD</span>
                          )}
                          {s.primary && (
                            <span className="station-badge">PRIMARY</span>
                          )}
                        </div>
                        <div className="station-values">
                          <span>
                            🌡️{' '}
                            {Number.isFinite(s.temp)
                              ? `${s.temp.toFixed(1)}°F`
                              : 'n/a'}
                          </span>
                          <span>
                            💧{' '}
                            {Number.isFinite(s.flow)
                              ? `${s.flow.toLocaleString()} cfs`
                              : 'n/a'}
                          </span>
                          <span>
                            📏{' '}
                            {Number.isFinite(s.gage)
                              ? `${s.gage.toFixed(2)} ft`
                              : 'n/a'}
                          </span>
                        </div>
                        {Number.isFinite(delta) &&
                          s.id !== primaryStationId && (
                            <div className="station-delta">
                              {delta > 0 ? '+' : ''}
                              {delta.toFixed(1)}°F vs dashboard temp
                            </div>
                          )}
                        {s.note && (
                          <div
                            className="station-note"
                            style={{ marginBottom: 0, marginTop: 6 }}
                          >
                            {s.note}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* SHARE SNAPSHOT */}
            <ShareSnapshot
              usgs={usgs}
              forecast={forecast}
              water={water}
              species={species}
            />
          </>
        );
      }

      function ForecastTab({ forecast, water, species }) {
        if (!forecast || forecast.length === 0) return <Loading />;
        const w = WATERS[water];
        const allPeriods = forecast.slice(0, 14);
        const dayPeriods = forecast.filter((p) => p.isDaytime).slice(0, 7);
        const [showMoonModal, setShowMoonModal] = React.useState(false);
        const [, _moonTick] = React.useState(0);

        // Fetch USNO moon phase data on mount; re-render when it arrives
        React.useEffect(function () {
          if (!_moonPhaseEvents) {
            fetchMoonPhaseData().then(function (events) {
              if (events) _moonTick(function (n) { return n + 1; });
            });
          }
        }, []);

        const todayPhase = getMoonPhase(new Date());

        function getNightEmoji(period, idx) {
          if (period.isDaytime) return '\u2705';
          var d = period.startTime ? new Date(period.startTime) : (function() {
            var x = new Date(); x.setDate(x.getDate() + Math.floor(idx / 2)); return x;
          })();
          return getMoonPhase(d).emoji;
        }

        return (
          <>
            {/* Moon trigger button */}
            <button
              className="moon-trigger"
              onClick={() => setShowMoonModal(true)}
              aria-label="Open lunar fishing intel"
            >
              <div className="moon-trigger-left">
                <div className="moon-trigger-phase">{todayPhase.emoji} {todayPhase.name} {'\u00B7'} {todayPhase.illumination}% illuminated</div>
                <div className="moon-trigger-sub">{todayPhase.daysToFull}d to Full {'\u00B7'} {todayPhase.daysToNew}d to New {'\u00B7'} Tap for lunar fishing intel</div>
              </div>
              <div className="moon-trigger-cta">LUNAR {'\u2192'}</div>
            </button>

            {showMoonModal && (
              <MoonPhaseModal
                onClose={() => setShowMoonModal(false)}
                species={species}
                water={water}
              />
            )}

            <div className="card">
              <div className="card-title">
                {'\u2600\uFE0F'} 7-Day Forecast {'\u2014'} {w.name} Area
              </div>
              {allPeriods.map((p, i) => (
                <div className="fc-row" key={i}>
                  <div className="fc-icon">{getWxIcon(p.shortForecast)}</div>
                  <div className="fc-day">{p.name}</div>
                  <div className="fc-temp">
                    {p.temperature}
                    {'\u00B0'}
                  </div>
                  <div className="fc-detail">
                    <div className="fc-desc">{p.shortForecast}</div>
                    {p.windSpeed && (
                      <div className="fc-wind">
                        {p.windSpeed} {p.windDirection}
                      </div>
                    )}
                  </div>
                  <div className="fc-daynight">
                    {getNightEmoji(p, i)}
                  </div>
                </div>
              ))}
            </div>

            <div className="card">
              <div className="card-title">
                {'\uD83C\uDFAF'} Fishing Window Analysis
              </div>
              {dayPeriods.map((p, i) => {
                const rating = rateFishing(p);
                const s = (p.shortForecast || '').toLowerCase();
                let icon = '\uD83D\uDCDD',
                  cls = 'note';
                if (rating.cls === 'best') {
                  icon = '\u2B50';
                  cls = 'best';
                } else if (rating.cls === 'good') {
                  icon = '\uD83D\uDC4D';
                  cls = 'good';
                }

                const notes = [];
                if (s.includes('sunny')) notes.push('Sunny');
                else if (s.includes('cloudy')) notes.push('Cloudy');
                if (s.includes('rain')) notes.push('Rain expected');
                const windNote = p.windSpeed
                  ? `, ${p.windSpeed} ${p.windDirection || ''}`
                  : '';

                let advice = '';
                if (rating.cls === 'best')
                  advice =
                    'Perfect conditions for scouting pre-spawn staging areas at creek mouths.';
                else if (s.includes('overcast') || s.includes('cloudy'))
                  advice =
                    'Overcast can be excellent for white bass \u2014 less spooky.';
                else if (s.includes('rain') && !s.includes('heavy'))
                  advice = 'Light rain can trigger feeding activity.';
                else if (
                  s.includes('front') ||
                  (i > 0 && p.temperature < dayPeriods[i - 1]?.temperature - 5)
                )
                  advice =
                    'Post-front conditions often produce excellent bites as barometric pressure stabilizes.';
                else advice = 'Monitor conditions and adjust approach.';

                return (
                  <div className={`fw-card ${cls}`} key={i}>
                    <div className="fw-card-title">
                      {icon}{' '}
                      {rating.cls === 'best'
                        ? 'BEST WINDOW'
                        : rating.cls === 'good'
                          ? 'GOOD'
                          : 'NOTE'}
                      : {p.name}
                    </div>
                    <div className="fw-card-body">
                      {p.temperature}
                      {'\u00B0'}F, {p.shortForecast}
                      {windNote}. {advice}
                    </div>
                  </div>
                );
              })}
              <div className="fw-card tip">
                <div className="fw-card-title">{'\uD83D\uDCA1'} Pro Tip</div>
                <div className="fw-card-body">
                  {dayPeriods[0]?.temperature > 60
                    ? `Those warm days (${dayPeriods[0]?.temperature}\u00B0F air) will push water temp up \u2014 could break 45\u00B0F soon. Monitor closely.`
                    : 'Watch for warming trends in the forecast. Consecutive warm days push water temperature toward spawn triggers faster than a single warm day.'}
                </div>
              </div>
            </div>
          </>
        );
      }

      function MoonPhaseModal({ onClose, species, water }) {
        const [modalTab, setModalTab] = React.useState('species');
        const [filter, setFilter] = React.useState('All');
        const closeRef = React.useRef(null);

        React.useEffect(() => {
          if (closeRef.current && typeof closeRef.current.focus === 'function') {
            closeRef.current.focus();
          }
          function onKey(e) {
            if (e.key === 'Escape' || e.key === 'Esc') { e.stopPropagation(); onClose(); }
          }
          document.addEventListener('keydown', onKey);
          return () => document.removeEventListener('keydown', onKey);
        }, [onClose]);

        // 7-day lunar grid
        var today = new Date(); today.setHours(0, 0, 0, 0);
        var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var days = Array.from({ length: 7 }, function(_, i) {
          var d = new Date(today); d.setDate(d.getDate() + i);
          return { date: d, phase: getMoonPhase(d) };
        });

        var peakDay = days.find(function(d) { return d.phase.name === 'Full Moon' || d.phase.name === 'New Moon'; });
        var todayPhase = getMoonPhase(today);

        // Current species
        var currentData = MOON_SPECIES_MATRIX[species] || null;
        var currentName = getSpeciesDisplayName(species);
        var isTailwater = TAXONOMY.waterTypeMap[water] === 'tailwater';

        // All species sorted by impact — memoized since SPECIES_CATALOG and MOON_SPECIES_MATRIX are static
        var allSpeciesRows = React.useMemo(function() {
          return SPECIES_CATALOG.reduce(function(acc, g) {
            return acc.concat(g.species.map(function(s) {
              return { id: s.id, name: s.name, data: MOON_SPECIES_MATRIX[s.id] || null };
            }));
          }, []).sort(function(a, b) {
            var ia = a.data ? (MOON_IMPACT_ORDER[a.data.impact] !== undefined ? MOON_IMPACT_ORDER[a.data.impact] : 99) : 99;
            var ib = b.data ? (MOON_IMPACT_ORDER[b.data.impact] !== undefined ? MOON_IMPACT_ORDER[b.data.impact] : 99) : 99;
            return ia - ib;
          });
        }, []);

        var FILTERS = ['All','HIGH','MED-HIGH','MEDIUM','LOW-MED','LOW'];
        var filtered = filter === 'All' ? allSpeciesRows : allSpeciesRows.filter(function(s) { return s.data && s.data.impact === filter; });

        return (
          <div className="moon-modal-backdrop" onClick={onClose}>
            <div
              className="moon-modal-sheet"
              role="dialog"
              aria-modal="true"
              aria-labelledby="moon-modal-title"
              onClick={function(e) { e.stopPropagation(); }}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                <div id="moon-modal-title" style={{ fontWeight: 800, fontSize: 16 }}>{todayPhase.emoji} Lunar Fishing Intel</div>
                <button
                  ref={closeRef}
                  onClick={onClose}
                  aria-label="Close lunar intel"
                  style={{ background: 'none', border: 'none', color: 'var(--text2)', fontSize: 20, cursor: 'pointer', width: 44, height: 44, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0 }}
                >{'\u2715'}</button>
              </div>

              {/* 7-day lunar grid */}
              <div className="moon-lunar-grid">
                {days.map(function(d, i) {
                  var isPeak = d.phase.name === 'Full Moon' || d.phase.name === 'New Moon';
                  return (
                    <div key={i} className={'moon-day-cell' + (isPeak ? ' peak' : '')}>
                      <div className="moon-day-cell-label">{DAY_NAMES[d.date.getDay()]}</div>
                      <div className="moon-day-cell-emoji">{d.phase.emoji}</div>
                      <div className="moon-day-cell-pct">{d.phase.illumination}%</div>
                    </div>
                  );
                })}
              </div>

              {/* Peak phase callout */}
              {peakDay && (
                <div className="moon-peak-callout">
                  {'\u2B50'} <strong>{peakDay.phase.name}</strong> on {DAY_NAMES[peakDay.date.getDay()]} within the 7-day window.
                  {currentData && (currentData.impact === 'HIGH' || currentData.impact === 'MED-HIGH') &&
                    ' Prime time for ' + currentName + '.'}
                </div>
              )}

              {/* Internal tabs */}
              <div className="moon-modal-tabs">
                <button
                  className={'moon-modal-tab' + (modalTab === 'species' ? ' active' : '')}
                  onClick={() => setModalTab('species')}
                >{'\u2B50'} Current Species</button>
                <button
                  className={'moon-modal-tab' + (modalTab === 'all' ? ' active' : '')}
                  onClick={() => setModalTab('all')}
                >{'\uD83D\uDCCB'} All Species</button>
              </div>

              {/* Current Species tab */}
              {modalTab === 'species' && (
                <>
                  {currentData ? (
                    <>
                      <div style={{ marginBottom: 4 }}>
                        <strong style={{ fontSize: 14 }}>{currentName}</strong>
                      </div>
                      <span className={'moon-impact-badge moon-impact-' + currentData.impact}>
                        {currentData.impact} Lunar Impact
                      </span>
                      <div className="moon-best-phases" style={{ marginTop: 6 }}>
                        Best phases: {currentData.bestPhases.join(', ')}
                      </div>
                      <div className="moon-strategy-cards">
                        <div className="moon-strategy-card">
                          <div className="moon-strategy-card-title">{'\u2600\uFE0F'} Daytime Strategy</div>
                          {currentData.dayStrategy}
                        </div>
                        <div className="moon-strategy-card">
                          <div className="moon-strategy-card-title">{todayPhase.emoji} Nighttime Strategy</div>
                          {currentData.nightStrategy}
                        </div>
                      </div>
                      {isTailwater && currentData.tailwaterNote && (
                        <div className="moon-tailwater-warn">
                          {'\u26A0\uFE0F'} <strong>Tailwater note:</strong> {currentData.tailwaterNote}
                        </div>
                      )}
                      <div className="moon-source-footer">
                        {'\uD83D\uDD17'} Source: {currentData.source}
                      </div>
                    </>
                  ) : (
                    <div className="moon-no-data">No lunar data yet for {currentName}.</div>
                  )}
                </>
              )}

              {/* All Species tab */}
              {modalTab === 'all' && (
                <>
                  {isTailwater && (
                    <div className="moon-tailwater-warn" style={{ marginBottom: 10 }}>
                      {'\u26A0\uFE0F'} <strong>Tailwater:</strong> Generation schedule typically overrides lunar influence for trout species.
                    </div>
                  )}
                  <div className="moon-filter-pills">
                    {FILTERS.map(function(f) {
                      return (
                        <button key={f} className={'moon-pill' + (filter === f ? ' active' : '')} onClick={() => setFilter(f)}>{f}</button>
                      );
                    })}
                  </div>
                  {filtered.map(function(s) {
                    return (
                      <div key={s.id} className={'moon-species-row' + (s.id === species ? ' selected' : '')}>
                        <span>
                          <span className="moon-species-name">{s.name}</span>
                          {s.id === species && <span className="moon-species-selected-label">{'\u2190'} selected</span>}
                        </span>
                        {s.data
                          ? <span className={'moon-impact-badge moon-impact-' + s.data.impact}>{s.data.impact}</span>
                          : <span style={{ fontSize: 11, color: 'var(--text3)' }}>No data</span>
                        }
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        );
      }

        const ranked = scoreLures(phase, clarity, flow, lureMap, baitMode);
        const top5 = ranked.slice(0, 5);
        const closeButtonRef = React.useRef(null);

        function handleToggle(mode) {
          setBaitMode(mode);
          try { localStorage.setItem('pfg_tackle_mode', mode); } catch(e) {}
        }

        React.useEffect(() => {
          if (closeButtonRef.current && typeof closeButtonRef.current.focus === 'function') {
            closeButtonRef.current.focus();
          }
          function handleKeyDown(e) {
            if (e.key === 'Escape' || e.key === 'Esc') {
              e.stopPropagation();
              onClose();
            }
          }
          document.addEventListener('keydown', handleKeyDown);
          return () => document.removeEventListener('keydown', handleKeyDown);
        }, [onClose]);

        return (
          <div className="tackle-box-backdrop" onClick={onClose}>
            <div

function LakeHero({ water, species, setSpecies, segment, setSegment, setWater, waterType, setWaterType, temp, usgs, loading, onRefresh }) {
        const w = WATERS[water];
        const showStrip = !loading && temp !== null;
        const isCrappie = CRAPPIE_IDS.has(species);
        const hotThreshold = isCrappie ? 60 : 55;
        const warmThreshold = isCrappie ? 55 : 47;
        const chipClass = showStrip
          ? temp >= hotThreshold ? 'hot' : temp >= warmThreshold ? 'warm' : 'cool'
          : '';
        const t24 = usgs?.tempTrend24;
        const trendStr = showStrip && Number.isFinite(t24)
          ? ` ${t24 > 0 ? '\u25B2' : t24 < 0 ? '\u25BC' : '\u2192'}${Math.abs(t24)}\u00B0/24hr`
          : '';
        const phase = showStrip ? getPhase(temp, species) : null;
        const showSegment = isRiverType(TAXONOMY.waterTypeMap[water]);
        return (
          <div className="lake-hero">
            <div className="hero-selects pfg-dropdown-nav">
              <div className="pfg-row1">
                <select
                  className="hero-select pfg-state-sel"
                  value="ar"
                  onChange={() => {}}
                  aria-label="State"
                >
                  <option value="ar">Arkansas</option>
                </select>
                <select
                  className="hero-select"
                  value={waterType}
                  onChange={(e) => {
                    const newType = e.target.value;
                    setWaterType(newType);
                    trackEvent('select_water_type', { water_type: newType, water, species });
                    if (newType !== 'all' && TAXONOMY.waterTypeMap[water] !== newType) {
                      const firstMatch = Object.keys(WATERS).find((k) => TAXONOMY.waterTypeMap[k] === newType);
                      if (firstMatch) {
                        setWater(firstMatch);
                        setSegment('all');
                      } else {
                        // No waters match this type; reset to 'all' to keep state consistent
                        setWaterType('all');
                        trackEvent('select_water_type_no_match', { water_type: newType, water, species });
                      }
                    }
                  }}
                  aria-label="Water Type"
                >
                  {TAXONOMY.types
                    .filter((t) => t.id === 'all' || Object.values(TAXONOMY.waterTypeMap).includes(t.id))
                    .map((t) => (
                      <option key={t.id} value={t.id}>{t.label}</option>
                    ))}
                </select>
              </div>
              <div className="pfg-row2">
                <select
                  className="hero-select"
                  value={water}
                  onChange={(e) => {
                    const key = e.target.value;
                    setWater(key);
                    setWaterType(getWaterTaxonomyType(key));
                    setSegment('all');
                    trackEvent('select_water', { water: key, species });
                  }}
                  aria-label="Water Body"
                >
                  {Object.entries(WATERS)
                    .filter(([key]) => waterType === 'all' || TAXONOMY.waterTypeMap[key] === waterType)
                    .map(([key, wt]) => (
                      <option key={key} value={key}>{wt.name}</option>
                    ))}
                </select>
                <select
                  className="hero-select"
                  value={species}
                  onChange={(e) => {
                    setSpecies(e.target.value);
                    trackEvent('hero_species_select', { species: e.target.value, water });
                    trackEvent('select_species', { species: e.target.value, water });
                  }}
                  aria-label="Species"
                >
                  {SPECIES_CATALOG.map((g) => (
                    <optgroup key={g.group} label={g.group}>
                      {g.species.map((s) => (
                        <option key={s.id} value={s.id}>{'🐟'} {s.name}</option>
                      ))}
                    </optgroup>
                  ))}
                </select>
              </div>
              {showSegment && (
                <div className="pfg-row3">
                  <select
                    className="hero-select"
                    value={segment}
                    onChange={(e) => {
                      setSegment(e.target.value);
                      trackEvent('hero_activity_select', { segment: e.target.value, water });
                      trackEvent('select_segment', { species, water, segment: e.target.value });
                    }}
                    aria-label="River Segment"
                  >
                    {getWaterSegments(water).map((s) => (
                      <option key={s.id} value={s.id}>{s.label}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
            {showStrip && (
              <div className="conditions-strip-wrapper">
                <div className="conditions-strip">
                  <div className={`conditions-chip ${chipClass}`}>
                    <span role="img" aria-label="thermometer">{'\uD83C\uDF21\uFE0F'}</span> {temp.toFixed(1)}{'\u00B0'}F
                    {trendStr && <span className="conditions-chip-label">{trendStr}</span>}
                  </div>
                  <div className="conditions-chip">
                    <span role="img" aria-label={phase.name}>{phase.icon}</span> {phase.name}
                  </div>
                  {Number.isFinite(usgs?.gage) && (
                    <div className="conditions-chip">
                      <span role="img" aria-label="ruler">{'\uD83D\uDCCF'}</span> {usgs.gage.toFixed(2)} ft
                      <span className="conditions-chip-label">gage ht</span>
                    </div>
                  )}
                  {Number.isFinite(usgs?.tempTrend7) && (
                    <div className="conditions-chip">
                      <span role="img" aria-label={usgs.tempTrend7 > 0 ? 'fire' : usgs.tempTrend7 < 0 ? 'snowflake' : 'right arrow'}>{usgs.tempTrend7 > 0 ? '\uD83D\uDD25' : usgs.tempTrend7 < 0 ? '\u2744\uFE0F' : '\u2192'}</span> {usgs.tempTrend7 > 0 ? '+' : ''}{usgs.tempTrend7}{'\u00B0'}/7d
                      <span className="conditions-chip-label">trend</span>
                    </div>
                  )}
                </div>
              </div>
            )}
            {onRefresh && (
              <div className="hero-refresh-row">
                <button className="refresh-btn" onClick={onRefresh}>
                  {'\u21BB'} Refresh
                </button>
              </div>
            )}
          </div>
        );
