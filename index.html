      function rateFishing(period) {
        const s = (period.shortForecast || '').toLowerCase();
        const temp = period.temperature || 50;
        let score = 5;
        if (s.includes('cloudy') || s.includes('overcast')) score += 2;
        if (s.includes('partly')) score += 1;
        if (s.includes('rain') && !s.includes('heavy')) score += 1;
        if (
          s.includes('heavy rain') ||
          s.includes('storm') ||
          s.includes('thunder')
        )
          score -= 3;
        if (s.includes('snow') || s.includes('ice')) score -= 3;
        if (s.includes('wind') && s.includes('strong')) score -= 1;
        if (temp >= 45 && temp <= 70) score += 1;
        if (temp < 32 || temp > 95) score -= 2;
        if (score >= 7) return { label: 'Best', cls: 'best' };
        if (score >= 5) return { label: 'Good', cls: 'good' };
        return { label: 'Fair', cls: 'fair' };
      }

      // Signal Engine — branches by water subtype to produce a richer signal object.
      // Returns: signal (go/scout/wait), icon, label, cls (unchanged for display),
      // plus signal_score (0-100), condition_label, and wading_safety (rivers only).
      //
      // @param {string} waterSubtype - 'reservoir' | 'tailwater' | 'natural_river' | 'lake'
      // @param {object|null} usgs    - live USGS data ({ flow, gageTrend7, ... }) or null
      // @param {string} species      - species id ('wb', 'cr', etc.)
      // @param {number|null} temp    - current water temperature in °F or null when unavailable
      // @returns {{ signal, icon, label, cls, signal_score, condition_label, wading_safety }}
      function computeSignal(waterSubtype, usgs, species, temp) {
        const hasTemp = Number.isFinite(temp);
        const spawnTrigger = getSpeciesSpawnTrigger(species);
        const scoutTemp = getSpeciesScoutTemp(species);

        if (!hasTemp) {
          return {
            signal: "wait",
            icon: "\u23F3",
            label: "NO DATA",
            cls: "wait",
            signal_score: 0,
            condition_label: "No Data",
            wading_safety: null,
          };
        }

        // For species without authored spawn data, emit a neutral WAIT signal so
        // "GO FISH!" never fires at the wrong temperature trigger.
        // Implemented species without a spawn-trigger model (stocking-driven trout) get
        // a "Season Guide" label instead of "No Species Data" so the UI stays consistent.
        if (!Number.isFinite(spawnTrigger)) {
          if (isSpeciesImplemented(species)) {
            // Tailwater trout (rainbow, cutthroat, brook): cold dam releases keep temps
            // 48-60°F year-round — always within preferred range. There is no "too cold"
            // condition for these species in a tailwater context (AGFC; Quigley et al.).
            // Signal quality is generation-driven (USACE/SWPA schedule), not temperature-driven.
            if (TROUT_IDS.has(species) && waterSubtype === 'tailwater') {
              let signal = 'go';
              let icon = '\uD83C\uDFA3';
              let label = 'GO FISH!';
              let cls = 'go';
              let signal_score = 65;
              let condition_label = 'Year-Round Tailwater';
              let wading_safety = null;

              if (Number.isFinite(usgs?.flow)) {
                if (usgs.flow > 3000) {
                  signal_score = Math.max(0, signal_score - 15);
                  condition_label += ' / High Generation';
                  wading_safety = {
                    safe: false,
                    label: 'Not Safe',
                    note: 'High generation releases. Do not wade.',
                  };
                } else if (usgs.flow < 300) {
                  signal_score = Math.max(0, signal_score - 5);
                  condition_label += ' / Low Generation';
                  wading_safety = {
                    safe: true,
                    label: 'Good Wading',
                    note: 'Low generation. Wading conditions generally safe.',
                  };
                } else {
                  signal_score = Math.min(100, signal_score + 5);
                  condition_label += ' / Active Generation';
                  wading_safety = {
                    safe: false,
                    label: 'Caution',
                    note: 'Active generation. Check dam schedule before wading.',
                  };
                }
              }
              return { signal, icon, label, cls, signal_score, condition_label, wading_safety };
            }

            return {
              signal: "wait",
              icon: "\uD83D\uDCC5",
              label: "SEASON",
              cls: "wait",
              signal_score: 30,
              condition_label: "See Season Guide",
              wading_safety: null,
            };
          }
          return {
            signal: "wait",
            icon: "\u23F3",
            label: "WAIT",
            cls: "wait",
            signal_score: 25,
            condition_label: "No Species Data",
            wading_safety: null,
          };
        }

        // Temperature-based signal base
        let signal, icon, label, cls, signal_score, condition_label;
        if (temp >= spawnTrigger) {
          signal = "go";
          icon = "\uD83D\uDD25";
          label = "GO FISH!";
          cls = "go";
          signal_score = 80;
          condition_label = "Prime Spawn";
        } else if (Number.isFinite(scoutTemp) && temp >= scoutTemp) {
          signal = "scout";
          icon = "\uD83D\uDC40";
          label = "SCOUT";
          cls = "scout";
          signal_score = 55;
          condition_label = "Pre-Spawn Active";
        } else {
          signal = "wait";
          icon = "\u2744\uFE0F";
          label = "WAIT";
          cls = "wait";
          signal_score = 25;
          condition_label = "Cold Hold";
        }

        let wading_safety = null;

        if (waterSubtype === "reservoir") {
          // Reservoir: 7-day pool trend shifts score ±5 pts
          // Thresholds: >+1ft rising, <-1ft falling (matches existing gageStatus logic)
          if (Number.isFinite(usgs?.gageTrend7)) {
            if (usgs.gageTrend7 > 1) {
              signal_score = Math.min(100, signal_score + 5);
              condition_label += " / Rising Pool";
            } else if (usgs.gageTrend7 < -1) {
              signal_score = Math.max(0, signal_score - 5);
              condition_label += " / Falling Pool";
            } else {
              condition_label += " / Stable Pool";
            }
          }
        } else if (waterSubtype === "tailwater") {
          // Tailwater: dam generation flow affects fishing quality and wading safety.
          // High: >3000 cfs (turbulent, unsafe); Low: <300 cfs; Moderate: 300-3000 cfs
          // Thresholds mirror existing flowStatus logic for river type.
          if (Number.isFinite(usgs?.flow)) {
            if (usgs.flow > 3000) {
              signal_score = Math.max(0, signal_score - 15);
              condition_label += " / High Generation";
              wading_safety = {
                safe: false,
                label: "Not Safe",
                note: "High generation releases. Do not wade.",
              };
            } else if (usgs.flow < 300) {
              signal_score = Math.max(0, signal_score - 5);
              condition_label += " / Low Generation";
              wading_safety = {
                safe: true,
                label: "Good Wading",
                note: "Low generation. Wading conditions generally safe.",
              };
            } else {
              signal_score = Math.min(100, signal_score + 5);
              condition_label += " / Active Generation";
              wading_safety = {
                safe: false,
                label: "Caution",
                note: "Active generation. Check dam schedule before wading.",
              };
            }
          } else {
            wading_safety = {
              safe: null,
              label: "Unknown",
              note: "No flow data. Check dam release schedule.",
            };
          }
        } else if (waterSubtype === "natural_river") {
          // Natural river: flow drives fishing quality and wading safety.
          // Flood: >5000 cfs; High: 2001-5000 cfs; Moderate-High: 1001-2000 cfs;
          // Good wading: 400-1000 cfs; Very low: <400 cfs
          if (Number.isFinite(usgs?.flow)) {
            if (usgs.flow > 5000) {
              signal_score = Math.max(0, signal_score - 20);
              condition_label += " / Flood Stage";
              wading_safety = {
                safe: false,
                label: "Dangerous",
                note: "Do not wade. Flood conditions.",
              };
            } else if (usgs.flow > 2000) {
              signal_score = Math.max(0, signal_score - 10);
              condition_label += " / High Flow";
              wading_safety = {
                safe: false,
                label: "Not Recommended",
                note: "High current. Wade with extreme caution.",
              };
            } else if (usgs.flow > 1000) {
              condition_label += " / Moderate-High Flow";
              wading_safety = {
                safe: true,
                label: "Caution",
                note: "Elevated flow. Experienced waders only.",
              };
            } else if (usgs.flow >= 400) {
              signal_score = Math.min(100, signal_score + 5);
              condition_label += " / Good Flow";
              wading_safety = {
                safe: true,
                label: "Good Wading",
                note: "Ideal wading conditions.",
              };
            } else {
              signal_score = Math.max(0, signal_score - 5);
              condition_label += " / Very Low Flow";
              wading_safety = {
                safe: true,
                label: "Easy Wading",
                note: "Low water. Fish may be skittish in clear, shallow conditions.",
              };
            }
          } else {
            wading_safety = {
              safe: null,
              label: "Unknown",
              note: "No flow data for wading safety assessment.",
            };
          }
        }
        // 'lake': no adjustment — preserves baseline temperature-only behavior

        return { signal, icon, label, cls, signal_score, condition_label, wading_safety };
      }

      // ─── LURE MASTER HYDRATION ───────────────────────────────────────────────
      // Loads data/lure-master.json in the background so scoreLures() can enrich
      // phase lures with condition_score, agfc_cited, etc. Falls back gracefully
      // if the file hasn't loaded yet or fetch is unavailable.
      const LURE_MASTER_STATE = {
        index: null,   // { byId: {}, byNameSub: {} }
        lures: [],     // raw lures array for live bait mode lookup
        loading: false
      };

      function indexLureMaster(raw) {
        const source = Array.isArray(raw) ? raw : (raw && Array.isArray(raw.lures) ? raw.lures : []);
        const byId = {};
        const byNameSub = {};
        source.forEach(function(lure) {
          if (!lure || typeof lure !== 'object') return;
          if (lure.id != null) byId[lure.id] = lure;
          if (lure.name && lure.sub) {
            byNameSub[String(lure.name).trim() + '::' + String(lure.sub).trim()] = lure;
          }
        });
        return { byId: byId, byNameSub: byNameSub };
      }

      function primeLureMaster() {
        if (LURE_MASTER_STATE.index || LURE_MASTER_STATE.loading) return;
        if (typeof fetch !== 'function') return;
        LURE_MASTER_STATE.loading = true;
        fetch('data/lure-master.json')
          .then(function(res) { return res && res.ok ? res.json() : null; })
          .then(function(data) {
            if (data) {
              LURE_MASTER_STATE.index = indexLureMaster(data);
              if (Array.isArray(data)) {
                LURE_MASTER_STATE.lures = data;
              } else if (data && Array.isArray(data.lures)) {
                LURE_MASTER_STATE.lures = data.lures;
              }
            }
          })
          .catch(function(err) {
            console && console.error && console.error('Failed to load lure-master.json', err);
          })
          .finally(function() { LURE_MASTER_STATE.loading = false; });
      }

      function hydrateLuresWithMaster(lures) {
        if (!Array.isArray(lures) || !lures.length) return lures;
        const index = LURE_MASTER_STATE.index;
        if (!index) { primeLureMaster(); return lures; }
        return lures.map(function(lure) {
          if (!lure || typeof lure !== 'object') return lure;
          var master = null;
          if (lure.id != null && index.byId[lure.id]) {
            master = index.byId[lure.id];
          } else if (lure.name && lure.sub) {
            var key = String(lure.name).trim() + '::' + String(lure.sub).trim();
            master = index.byNameSub[key] || null;
          }
          // Phase lure fields win on conflict — preserves display-specific detail/sub over master defaults
          return master ? Object.assign({}, master, lure) : lure;
        });
      }

      // Prime lure master loading on script execution
      primeLureMaster();

      function deriveClarity(waterKey, flow) {
        const w = WATERS[waterKey] || {};
        const wtype = w.subtype || w.type || '';
        if (wtype === 'reservoir') return 'clear';
        if (Number.isFinite(flow)) {
          if (flow > 1500) return 'muddy';
          if (flow > 500) return 'stained';
          return 'clear';
        }
        return 'stained';
      }

      function scoreLures(phase, clarity, flow, lureMap, baitMode) {
        const mode = baitMode || 'artificial';
        const isHighFlow = Number.isFinite(flow) && flow > 1500;
        const isLowFlow  = Number.isFinite(flow) && flow < 300;
        const DEFAULT_SCORE = 5;
        const calcScore = l => {
          const cs = (l && l.condition_score) || {};
          return (cs[clarity] || DEFAULT_SCORE) +
            (isHighFlow ? (cs.high_flow || DEFAULT_SCORE) : 0) +
            (isLowFlow  ? (cs.low_flow  || DEFAULT_SCORE) : 0);
        };

        if (mode === 'live') {
          // Source live bait from master file, filtered by phase_affinity
          const masterLures = LURE_MASTER_STATE.lures;
          if (!masterLures.length) { primeLureMaster(); return []; }
          const liveLures = masterLures.filter(l => l.bait_type && l.bait_type !== 'artificial');
          const phaseFiltered = liveLures.filter(l =>
            !l.phase_affinity || !l.phase_affinity.length || l.phase_affinity.includes(phase)
          );
          const toScore = phaseFiltered.length ? phaseFiltered : liveLures;
          return [...toScore].sort((a, b) => calcScore(b) - calcScore(a));
        }

        // artificial mode (default): existing behavior, exclude live/cut bait
        const baseLures = (lureMap && phase) ? (lureMap[phase] || []) : [];
        if (!baseLures.length) return baseLures;
        const lures = hydrateLuresWithMaster(baseLures);
        const artificial = lures.filter(l => !l.bait_type || l.bait_type === 'artificial' || l.bait_type === 'scented_soft');
        const hasScores = artificial.some(l => l.condition_score);
        if (!hasScores) return artificial;
        return [...artificial].sort((a, b) => calcScore(b) - calcScore(a));
      }

      function estimateTempFromForecast(forecast, waterType) {
        const dayPeriods = (forecast || [])
          .filter((p) => p?.isDaytime && Number.isFinite(p?.temperature))
          .slice(0, 7);
        if (dayPeriods.length === 0) return null;

        const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
        const estimated = dayPeriods.map((p) => {
          const air = p.temperature;
          const offset =
            waterType === 'river'
              ? air < 45
                ? 10
                : air < 60
                  ? 8
                  : 6
              : air < 45
                ? 12
                : air < 60
                  ? 10
                  : 8;
          const temp = clamp(air - offset, 34, 88);
          return { day: p.name, avg: +temp.toFixed(1) };
        });

        const first = estimated[0]?.avg;
        const second = estimated[1]?.avg;
        const last = estimated[estimated.length - 1]?.avg;
        return {
          temp: first,
          tempTrend24: Number.isFinite(second)
            ? +(second - first).toFixed(1)
            : null,
          tempTrend7: Number.isFinite(last) ? +(last - first).toFixed(1) : null,
          temps7: estimated,
          tempSource: 'estimated',
          tempSourceLabel: 'Estimated from NWS forecast',
          tempSourceNote:
            'No live water-temperature sensor available for this location; estimate uses forecast air-temperature trend.',
        };
      }

      // ─── API FUNCTIONS ──────────────────────────────────────────
      async function fetchUSGS(siteId) {
        if (!siteId) {
          // No USGS gauge for this location
          return {
            temp: null,
            tempTrend24: null,
            tempTrend7: null,
            temps7: [],
            flow: null,
            flowTrend24: null,
            flowTrend7: null,
            flows7: [],
            gage: null,
            gageTrend24: null,
            gageTrend7: null,
            gages7: [],
            lastReading: null,
            tempSource: null,
            tempSourceLabel: null,
            tempSourceNote: null,
          };
        }
        const url = `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${siteId}&parameterCd=00010,00060,00065&period=P7D`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('USGS API error');
        const data = await resp.json();
        const result = {
          temp: null,
          tempTrend24: null,
          tempTrend7: null,
          temps7: [],
          flow: null,
          flowTrend24: null,
          flowTrend7: null,
          flows7: [],
          gage: null,
          gageTrend24: null,
          gageTrend7: null,
          gages7: [],
          lastReading: null,
          tempSource: null,
          tempSourceLabel: null,
          tempSourceNote: null,
        };
        const series = data?.value?.timeSeries || [];
        // USGS returns water temp (00010) in Celsius — convert to Fahrenheit
        const cToF = (c) => +((c * 9) / 5 + 32).toFixed(1);
        for (const ts of series) {
          const code = ts.variable?.variableCode?.[0]?.value;
          const rawVals = ts.values?.[0]?.value || [];
          if (rawVals.length === 0) continue;
          if (code === '00010') {
            // Filter out equipment malfunction readings (-999999)
            const vals = rawVals.filter((v) => parseFloat(v.value) > -99999);
            if (vals.length === 0) continue;
            const latest = vals[vals.length - 1];
            const latestC = parseFloat(latest.value);
            const latestF = cToF(latestC);
            const latestTime = new Date(latest.dateTime);
            result.temp = latestF;
            result.lastReading = latestTime;
            result.tempSource = 'sensor';
            result.tempSourceLabel = 'Live USGS sensor';
            result.tempSourceNote = 'USGS parameter 00010 (water temperature).';
            // 24-hour trend (in °F)
            const t24 = new Date(latestTime - 24 * 60 * 60 * 1000);
            const v24 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t24) < 2 * 60 * 60 * 1000
            );
            if (v24)
              result.tempTrend24 = +(
                latestF - cToF(parseFloat(v24.value))
              ).toFixed(1);
            // 7-day trend (in °F)
            const t7 = new Date(latestTime - 7 * 24 * 60 * 60 * 1000);
            const v7 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t7) < 4 * 60 * 60 * 1000
            );
            if (v7)
              result.tempTrend7 = +(
                latestF - cToF(parseFloat(v7.value))
              ).toFixed(1);
            // Daily averages for 7-day chart (converted to °F)
            const days = {};
            for (const v of vals) {
              const d = new Date(v.dateTime);
              const key = `${d.getMonth() + 1}/${d.getDate()}`;
              if (!days[key])
                days[key] = {
                  label: d.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                  }),
                  vals: [],
                };
              days[key].vals.push(cToF(parseFloat(v.value)));
            }
            result.temps7 = Object.values(days)
              .slice(-7)
              .map((d) => ({
                day: d.label,
                avg: +(
                  d.vals.reduce((a, b) => a + b, 0) / d.vals.length
                ).toFixed(1),
              }));
          }
          if (code === '00060') {
            const vals = rawVals.filter((v) => parseFloat(v.value) > -99999);
            if (vals.length === 0) continue;
            const latest = vals[vals.length - 1];
            const latestVal = parseFloat(latest.value);
            const latestTime = new Date(latest.dateTime);
            result.flow = Math.round(latestVal);
            if (!result.lastReading || latestTime > result.lastReading)
              result.lastReading = latestTime;
            const t24 = new Date(latestTime - 24 * 60 * 60 * 1000);
            const v24 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t24) < 3 * 60 * 60 * 1000
            );
            if (v24)
              result.flowTrend24 = Math.round(
                latestVal - parseFloat(v24.value)
              );
            const t7 = new Date(latestTime - 7 * 24 * 60 * 60 * 1000);
            const v7 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t7) < 8 * 60 * 60 * 1000
            );
            if (v7)
              result.flowTrend7 = Math.round(latestVal - parseFloat(v7.value));
            const days = {};
            for (const v of vals) {
              const d = new Date(v.dateTime);
              const key = `${d.getMonth() + 1}/${d.getDate()}`;
              if (!days[key])
                days[key] = {
                  label: d.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                  }),
                  vals: [],
                };
              days[key].vals.push(parseFloat(v.value));
            }
            result.flows7 = Object.values(days)
              .slice(-7)
              .map((d) => ({
                day: d.label,
                avg: Math.round(
                  d.vals.reduce((a, b) => a + b, 0) / d.vals.length
                ),
              }));
          }
          if (code === '00065') {
            const vals = rawVals.filter((v) => parseFloat(v.value) > -99999);
            if (vals.length === 0) continue;
            const latest = vals[vals.length - 1];
            const latestVal = parseFloat(latest.value);
            const latestTime = new Date(latest.dateTime);
            result.gage = +latestVal.toFixed(2);
            if (!result.lastReading || latestTime > result.lastReading)
              result.lastReading = latestTime;
            const t24 = new Date(latestTime - 24 * 60 * 60 * 1000);
            const v24 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t24) < 3 * 60 * 60 * 1000
            );
            if (v24)
              result.gageTrend24 = +(latestVal - parseFloat(v24.value)).toFixed(
                2
              );
            const t7 = new Date(latestTime - 7 * 24 * 60 * 60 * 1000);
            const v7 = vals.find(
              (v) => Math.abs(new Date(v.dateTime) - t7) < 8 * 60 * 60 * 1000
            );
            if (v7)
              result.gageTrend7 = +(latestVal - parseFloat(v7.value)).toFixed(
                2
              );
            const days = {};
            for (const v of vals) {
              const d = new Date(v.dateTime);
              const key = `${d.getMonth() + 1}/${d.getDate()}`;
              if (!days[key])
                days[key] = {
                  label: d.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                  }),
                  vals: [],
                };
              days[key].vals.push(parseFloat(v.value));
            }
            result.gages7 = Object.values(days)
              .slice(-7)
              .map((d) => ({
                day: d.label,
                avg: +(
                  d.vals.reduce((a, b) => a + b, 0) / d.vals.length
                ).toFixed(2),
              }));
          }
        }
        return result;
      }

      async function fetchUSGSStations(stations = []) {
        if (!Array.isArray(stations) || stations.length === 0) {
          const empty = await fetchUSGS(null);
          return { ...empty, stationReadings: [] };
        }

        const settled = await Promise.allSettled(
          stations.map((s) => fetchUSGS(s.id))
        );
        const stationReadings = settled.map((res, idx) => {
          const station = stations[idx];
          const fallback = {
            temp: null,
            tempTrend24: null,
            tempTrend7: null,
            temps7: [],
            flow: null,
            flowTrend24: null,
            flowTrend7: null,
            flows7: [],
            gage: null,
            gageTrend24: null,
            gageTrend7: null,
            gages7: [],
            lastReading: null,
            tempSource: null,
            tempSourceLabel: null,
            tempSourceNote: null,
          };
          const payload = res.status === 'fulfilled' ? res.value : fallback;
          return {
            id: station.id,
            label: station.label || `USGS #${station.id}`,
            note: station.note || null,
            primaryConfigured: !!station.primary,
            ...payload,
          };
        });

        const hasAnyReading = (station) =>
          Number.isFinite(station?.temp) ||
          Number.isFinite(station?.flow) ||
          Number.isFinite(station?.gage) ||
          station?.lastReading;
        const hasTempReading = (station) => Number.isFinite(station?.temp);

        const configuredPrimary =
          stationReadings.find((s) => s.primaryConfigured) || stationReadings[0];

        const tempPrimary =
          stationReadings.find((s) => s.primaryConfigured && hasTempReading(s)) ||
          stationReadings.find((s) => hasTempReading(s)) ||
          null;

        const summaryStation =
          tempPrimary ||
          stationReadings.find((s) => s.primaryConfigured && hasAnyReading(s)) ||
          stationReadings.find((s) => hasTempReading(s)) ||
          stationReadings.find((s) => hasAnyReading(s)) ||
          stationReadings.find((s) => s.primaryConfigured) ||
          stationReadings[0];

        const normalizedReadings = stationReadings.map((station) => ({
          ...station,
          primary: station.id === configuredPrimary?.id,
          summary: station.id === summaryStation?.id,
        }));

        const numericTemps = normalizedReadings
          .map((s) => s.temp)
          .filter((t) => Number.isFinite(t));
        const tempSpread =
          numericTemps.length >= 2
            ? +(Math.max(...numericTemps) - Math.min(...numericTemps)).toFixed(
                1
              )
            : null;

        let tempSourceNote = summaryStation?.tempSourceNote || null;
        if (
          tempPrimary &&
          configuredPrimary &&
          tempPrimary.id !== configuredPrimary.id &&
          !hasTempReading(configuredPrimary)
        ) {
          tempSourceNote = `Using ${tempPrimary.label} live temperature because the configured primary station (${configuredPrimary.label}) does not report parameter 00010.`;
        }

        return {
          ...summaryStation,
          primaryStationId: configuredPrimary?.id || null,
          primaryStationLabel: configuredPrimary?.label || null,
          summaryStationId: summaryStation?.id || null,
          summaryStationLabel: summaryStation?.label || null,
          tempSourceNote,
          stationReadings: normalizedReadings,
          tempSpread,
        };
      }

      let usaceSnapshotCache = null;
      async function fetchUSACESnapshot(waterKey) {
        if (usaceSnapshotCache === null) {
          const resp = await fetch(`data/usace_levels.json?v=${Date.now()}`, {
            cache: 'no-store',
          });
          if (!resp.ok) throw new Error('USACE snapshot unavailable');
          usaceSnapshotCache = await resp.json();
        }
        return usaceSnapshotCache?.waters?.[waterKey] || null;
      }

      async function fetchNWS(lat, lon) {
        const pts = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
        if (!pts.ok) throw new Error('NWS points error');
        const ptsData = await pts.json();
        const fcUrl = ptsData.properties?.forecast;
        if (!fcUrl) throw new Error('No forecast URL');
        const fc = await fetch(fcUrl);
        if (!fc.ok) throw new Error('NWS forecast error');
        const fcData = await fc.json();
        return fcData.properties?.periods || [];
      }

      function ShareSnapshot({ usgs, forecast, water, species }) {
        const [toast, setToast] = React.useState(false);
        const w = WATERS[water];
        const temp = usgs?.temp ?? null;
        const phase = getPhase(temp, species);
        const spawnTrigger = getSpeciesSpawnTrigger(species);
        const speciesName = getSpeciesDisplayName(species);
        const tempIsEstimated = usgs?.tempSource === 'estimated';
        const triggerDist =
          (temp !== null && Number.isFinite(spawnTrigger))
            ? Math.max(0, spawnTrigger - temp).toFixed(1)
            : null;
        const dayPeriods = (forecast || [])
          .filter((p) => p.isDaytime)
          .slice(0, 3);
        const bestDay = dayPeriods.reduce((best, p) => {
          const s = rateFishing(p);
          return !best || s.label === 'Best'
            ? {
                day: p.name,
                temp: p.temperature,
                fc: p.shortForecast,
                rating: s.label,
              }
            : best;
        }, null);

        const buildText = () => {
          const lines = [
            `\uD83D\uDC1F ${speciesName} Intel \u2022 ${w.name}`,
            `\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500`,
            temp !== null
              ? `\uD83C\uDF21 Water: ${temp.toFixed(1)}\u00B0F${tempIsEstimated ? ' (estimated)' : ''} \u2022 ${phase.name}`
              : `\uD83C\uDF21 Temp unavailable`,
          ];
          if (usgs?.tempTrend24 !== null) {
            const t24 = `${usgs.tempTrend24 > 0 ? '+' : ''}${usgs.tempTrend24}\u00B0`;
            const t7 =
              usgs?.tempTrend7 !== null
                ? `${usgs.tempTrend7 > 0 ? '+' : ''}${usgs.tempTrend7}\u00B0`
                : 'n/a';
            lines.push(`\uD83D\uDCC8 24hr: ${t24} \u2022 7day: ${t7}`);
          }
          if (triggerDist > 0)
            lines.push(
              `\uD83C\uDFAF ${triggerDist}\u00B0F to ${CRAPPIE_IDS.has(species) ? 'bed spawn' : 'spawn trigger'}`
            );
          else if (temp >= spawnTrigger)
            lines.push(
              `\uD83D\uDD25 ${CRAPPIE_IDS.has(species) ? 'Bed spawn' : 'Spawn'} temps reached!`
            );
          if (bestDay)
            lines.push(
              `\u2B50 Best window: ${bestDay.day} (${bestDay.temp}\u00B0F, ${bestDay.fc})`
            );
          if (usgs?.flow)
            lines.push(`\uD83D\uDCA7 Flow: ${usgs.flow.toLocaleString()} cfs`);
          if (Number.isFinite(usgs?.gage)) {
            const stationLabel = usgs.summaryStationLabel || usgs.primaryStationLabel || 'USGS station';
            lines.push(`\uD83D\uDCCF Gage: ${usgs.gage.toFixed(2)} ft at ${stationLabel}*`);
          }
          const lureMap = _getLureMap(species);
          const clarity = deriveClarity(water, usgs?.flow);
          if (temp !== null) {
            const topLures = scoreLures(phase.name, clarity, usgs?.flow, lureMap, 'artificial');
            const topLure = topLures?.[0];
            if (topLure) {
              lines.push(
                `\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500`
              );
              lines.push(`\uD83C\uDFA3 Top Pick: ${topLure.name}`);
              lines.push(`   ${topLure.detail}`);
              lines.push(`   \u2192 https://pocketfishinguide.com#tackle`);
            }
          }
          const tips = CRAPPIE_IDS.has(species) && w?.crTips ? w.crTips : w?.tips;
          const tip = tips?.[0]?.text;
          if (tip) lines.push(`\uD83D\uDCA1 Pro Tip: ${tip}`);
          lines.push(
            `\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500`
          );
          if (Number.isFinite(usgs?.gage)) {
            const gageId = usgs.summaryStationId || usgs.primaryStationId || '';
            lines.push(`*Gage height${gageId ? ` at USGS ${gageId}` : ''} \u2014 not lake depth.`);
          }
          lines.push(`https://pocketfishinguide.com`);
          return lines.join('\n');
        };

        const share = async () => {
          const text = buildText();
          if (navigator.share) {
            try {
              await navigator.share({ text });
              return;
            } catch {}
          }
          try {
            await navigator.clipboard.writeText(text);
            setToast(true);
            setTimeout(() => setToast(false), 2000);
          } catch {}
        };

        return (
          <>
            <button className="share-btn" onClick={share}>
              {'\uD83D\uDCE4'} Share Fishing Report
            </button>
            {toast && (
              <div className="share-toast">{'\u2705'} Copied to clipboard!</div>
            )}
          </>
        );
      }

        const [goal, setGoal] = React.useState('');

        const categories = ['Bug', 'Feature Idea', 'Fishing Tip', 'General'];

          'Planning a trip',
          'Checking live conditions',
          'Selecting a water body',
          'Looking for tactics',
          'Sharing a report',
          'Other',
        ];

        const applySentimentDefaults = (nextSentiment, nextScore = score) => {
          setSentiment(nextSentiment);
          if (nextSentiment === 'bad' && !cat) setCat('Bug');
          if (nextSentiment === 'good' && !cat) setCat('General');
          if (nextSentiment === 'good')
            setPriority(nextScore >= 4 ? 'Low' : 'Medium');
          if (nextSentiment === 'bad')
            setPriority(nextScore <= 2 ? 'High' : 'Medium');
          if (nextSentiment === 'other') setPriority('Medium');
        };

        const applyScoreDefaults = (nextScore) => {
          setScore(nextScore);
          if (sentiment === 'good')
            setPriority(nextScore >= 4 ? 'Low' : 'Medium');
          if (sentiment === 'bad')
            setPriority(nextScore <= 2 ? 'High' : 'Medium');
        };

        const problemPlaceholder =
          cat === 'Bug'
            ? 'What broke, where, and what did you expect instead?'
            : cat === 'Feature Idea'
              ? 'What should we add or improve, and why would it help?'
              : cat === 'Fishing Tip'
                ? 'Share the tip and where/when it worked best.'

        const buildBody = () => {
          const parts = [];
          parts.push(`**Category:** ${cat || 'General'}`);
          parts.push(`**Details (required):**\n${problem}`);

            `**Review Type:** ${sentiment ? sentiment[0].toUpperCase() + sentiment.slice(1) : 'Not selected'}`

          setOpen(false);
          setCat('');
          setPriority('Medium');
          setJourney('Planning a trip');
          setSentiment('');
          setScore(0);
          setGoal('');
          setProblem('');
          setOutcome('');
          setContact('');
          setToast(true);
          setTimeout(() => setToast(false), 3000);
        };

        return (
          <>
            <button
              className="fb-fab"
              onClick={() => setOpen(!open)}
              title="Send Feedback"

              📬

              <div className="fb-overlay" onClick={() => setOpen(false)}>
