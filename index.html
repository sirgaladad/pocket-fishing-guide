      function OverviewTab({ species, onSelectWater }) {
        const [allData, setAllData] = useState({});
        const [loading, setLoading] = useState(true);
        const [typeFilter, setTypeFilter] = useState('all');

        useEffect(() => {
          const loadAllWaters = async () => {
            setLoading(true);
            const waterKeys = Object.keys(WATERS);
            const results = {};

            for (const key of waterKeys) {
              const w = WATERS[key];
              try {
                const [usgsData, nwsData, usaceData] = await Promise.allSettled(
                  [
                    fetchUSGSStations(getWaterStations(w)),
                    fetchNWS(w.lat, w.lon),
                    fetchUSACESnapshot(key),
                  ]
                );

                const merged =
                  usgsData.status === 'fulfilled'
                    ? { ...usgsData.value }
                    : {
                        temp: null,
                        tempTrend24: null,
                        tempTrend7: null,
                        temps7: [],
                        flow: null,
                        gage: null,
                      };

                if (
                  usaceData.status === 'fulfilled' &&
                  usaceData.value?.status === 'ok'
                ) {
                  const u = usaceData.value;
                  if (u.currentPowerPool !== null)
                    merged.gage = u.currentPowerPool;
                  else if (u.gage !== null) merged.gage = u.gage;
                  if (u.flow !== null) merged.flow = u.flow;
                  if (u.gageTrend7 !== null) merged.gageTrend7 = u.gageTrend7;
                  if (u.flowTrend7 !== null) merged.flowTrend7 = u.flowTrend7;
                  if (Array.isArray(u.temps7) && u.temps7.length > 0)
                    merged.temps7 = u.temps7;
                }

                if (
                  !Number.isFinite(merged.temp) &&
                  nwsData.status === 'fulfilled'
                ) {
                  const est = estimateTempFromForecast(nwsData.value, w.type);
                  if (est) {
                    merged.temp = est.temp;
                    merged.tempTrend7 = est.tempTrend7;
                    merged.temps7 = est.temps7;
                  }
                }

                results[key] = merged;
              } catch (e) {
                results[key] = {
                  temp: null,
                  tempTrend7: null,
                  temps7: [],
                  flow: null,
                  gage: null,
                };
              }
            }

            setAllData(results);
            setLoading(false);
          };

          loadAllWaters();
        }, []);

        const spawnTrigger = getSpeciesSpawnTrigger(species);
        const scoutTemp = getSpeciesScoutTemp(species);

        const getVerdict = (temp) => {
          if (!Number.isFinite(temp)) return { icon: '⏳', cls: 'no-data' };
          if (!Number.isFinite(spawnTrigger)) return { icon: '⏳', cls: 'no-data' };
          if (temp >= spawnTrigger) return { icon: '🔥', cls: 'go' };
          if (Number.isFinite(scoutTemp) && temp >= scoutTemp) return { icon: '👀', cls: 'scout' };
          return { icon: '❄️', cls: 'wait' };
        };

        const trendArr = (v) => (v > 0 ? '▲' : v < 0 ? '▼' : '→');
        const trendCls = (v) => (v > 0 ? 'up' : v < 0 ? 'down' : 'flat');

        if (loading) return <Loading />;

        return (
          <>
            <div className="overview-intro">
              <h2>🗺️ Arkansas Waters</h2>
              <p>
                Compare current conditions across all 9 major water bodies. Tap
                any water to view full dashboard with detailed intel, forecast,
                and access information.
              </p>
            </div>

            <div className="water-type-filter">
              {[
                { id: 'all', label: 'All Waters' },
                { id: 'lake', label: '🏞️ Lakes' },
                { id: 'river', label: '🌊 Rivers' },
              ].map((f) => (
                <button
                  key={f.id}
                  className={`water-type-btn ${typeFilter === f.id ? 'active' : ''}`}
                  onClick={() => setTypeFilter(f.id)}
                >
                  {f.label}
                </button>
              ))}
            </div>

            <div className="overview-grid">
              {Object.entries(WATERS)
                .filter(([, w]) => typeFilter === 'all' || (w.type ?? '') === typeFilter)
                .map(([key, w]) => {
                const data = allData[key] || {};
                const temp = data.temp ?? null;
                const hasTemp = Number.isFinite(temp);
                const phase = getPhase(temp, species);
                const verdict = getVerdict(temp);
                const tempTrend = data.tempTrend7 ?? null;

                return (
                  <div
                    className="water-card"
                    key={key}
                    onClick={() => onSelectWater(key)}
                  >
                    <div className="water-card-header">
                      <div>
                        <div className="water-card-name">{w.short}</div>
                        <div className="water-card-type">
                          {w.type} · {w.nwsOffice}
                        </div>
                      </div>
                      <div className={`water-card-verdict ${verdict.cls}`}>
                        {verdict.icon}
                      </div>
                    </div>

                    <div className="water-card-metrics">
                      <div className="water-metric">
                        <div className="water-metric-label">🌡️ Water Temp</div>
                        <div className="water-metric-value">
                          {hasTemp ? `${temp.toFixed(1)}°F` : 'n/a'}
                        </div>
                        {Number.isFinite(tempTrend) && (
                          <div
                            className={`water-metric-sub water-card-trend ${trendCls(tempTrend)}`}
                          >
                            {trendArr(tempTrend)} {tempTrend > 0 ? '+' : ''}
                            {tempTrend.toFixed(1)}° /7d
                          </div>
                        )}
                      </div>

                      <div className="water-metric">
                        <div className="water-metric-label">
                          🎣 {getSpeciesDisplayName(species)} Phase
                        </div>
                        <div
                          className="water-metric-value"
                          style={{ fontSize: 12, color: phase.color }}
                        >
                          {phase.icon} {phase.name}
                        </div>
                        {hasTemp && Number.isFinite(spawnTrigger) && (
                           <div className="water-metric-sub">
                             {Math.max(0, spawnTrigger - temp).toFixed(1)}°F to
                             spawn
                           </div>
                         )}
                      </div>
                    </div>

                    {data.temps7?.length > 0 && (
                      <div className="water-card-sparkline">
                        {(() => {
                          const avgs = data.temps7.map((x) => x.avg);
                          const maxT = Math.max(...avgs);
                          const minT = Math.min(...avgs);
                          const range = maxT - minT;
                          return data.temps7.map((t, i) => {
                            const pct =
                              range < 0.1 ? 50 : ((t.avg - minT) / range) * 100;
                            const isLast = i === data.temps7.length - 1;
                            return (
                              <div
                                key={i}
                                className={`water-card-spark-bar ${isLast ? 'last' : ''}`}
                                style={{ height: `${pct}%` }}
                                title={`${t.day}: ${t.avg}°F`}
                              ></div>
                            );
                          });
                        })()}
                      </div>
                    )}

                    <div
                      className="water-card-phase"
                      style={{ borderLeft: `3px solid ${phase.color}` }}
                    >
                      <span className="water-card-phase-icon">
                        {phase.icon}
                      </span>
                      <span
                        className="water-card-phase-name"
                        style={{ color: phase.color }}
                      >
                        {phase.name}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="overview-legend">
              <div className="overview-legend-title">📊 Legend</div>
              <div className="overview-legend-items">
                <div className="overview-legend-item">
                  <div
                    className="overview-legend-dot"
                    style={{ background: 'rgba(76,175,80,.5)' }}
                  ></div>
                  <span>🔥 GO: Spawn temps reached</span>
                </div>
                <div className="overview-legend-item">
                  <div
                    className="overview-legend-dot"
                    style={{ background: 'rgba(255,152,0,.5)' }}
                  ></div>
                  <span>👀 SCOUT: Approaching spawn</span>
                </div>
                <div className="overview-legend-item">
                  <div
                    className="overview-legend-dot"
                    style={{ background: 'rgba(33,150,243,.5)' }}
                  ></div>
                  <span>❄️ WAIT: Too cold</span>
                </div>
                <div className="overview-legend-item">
                  <div
                    className="overview-legend-dot"
                    style={{ background: 'rgba(100,100,100,.3)' }}
                  ></div>
                  <span>⏳ NO DATA</span>
                </div>
              </div>
            </div>
          </>
        );
      }

      // ─── MAIN APP ───────────────────────────────────────────────
      function App() {
        const [water, setWater] = useState(() => {
          try {
            const stored = localStorage.getItem('pfg_water') || localStorage.getItem('selectedWater');
            if (stored && WATERS[stored]) {
              return stored;
            }
            // Fallback to default and repair invalid or missing value
            try {
              localStorage.setItem('pfg_water', DEFAULT_WATER);
              localStorage.setItem('selectedWater', DEFAULT_WATER);
            } catch {
              // Ignore localStorage write errors (e.g., private browsing, quota exceeded)
            }
            return DEFAULT_WATER;
          } catch {
            return DEFAULT_WATER;
          }
        });
        const [tab, setTab] = useState(() => {
          try {
            const stored = localStorage.getItem('pfg_active_tab');
            if (stored && TABS.some((t) => t.id === stored)) return stored;
            return 'signals';
          } catch {
            return 'signals';
          }
        });
        const [species, setSpecies] = useState(() => {
          try {
            const stored = localStorage.getItem('pfg_species') || localStorage.getItem('selectedSpecies');
            if (stored && ALL_SPECIES_IDS.includes(stored)) {
              return stored;
            }
            // Fallback to default and repair invalid or missing value
            try {
              localStorage.setItem('pfg_species', 'wb');
              localStorage.setItem('selectedSpecies', 'wb');
            } catch {
              // Ignore localStorage write errors (e.g., private browsing, quota exceeded)
            }
            return 'wb';
          } catch {
            return 'wb';
          }
        });
        const [segment, setSegment] = useState(() => {
          try {
            const stored = localStorage.getItem('pfg_segment');
            const allValidSegments = Object.values(TAXONOMY.segments).flat().map((s) => s.id).concat(['all']);
            if (stored && allValidSegments.includes(stored)) return stored;
            return 'all';
          } catch {
            return 'all';
          }
        });
        const [waterType, setWaterType] = useState(() => {
          try {
            const stored = localStorage.getItem('pfg_water_type');
            const storedWater = localStorage.getItem('pfg_water') || localStorage.getItem('selectedWater') || DEFAULT_WATER;
            const currentWater = WATERS[storedWater] ? storedWater : DEFAULT_WATER;
            const expectedType = getWaterTaxonomyType(currentWater);
            if (stored && TAXONOMY.types.some((t) => t.id === stored) && stored === expectedType) return stored;
            return expectedType;
          } catch {
            return getWaterTaxonomyType(DEFAULT_WATER);
          }
        });
        const [headerCompact, setHeaderCompact] = useState(false);
        const [navOpen, setNavOpen] = useState(false);
        const [usgs, setUsgs] = useState(null);
        const [forecast, setForecast] = useState(null);
        const [error, setError] = useState(null);
        const [loading, setLoading] = useState(true);
        const [riverSection, setRiverSection] = useState(null);

        useEffect(() => {
          try {
            localStorage.setItem('pfg_water', water);
            localStorage.setItem('selectedWater', water);
          } catch {}
        }, [water]);

        useEffect(() => {
          try {
            localStorage.setItem('pfg_species', species);
            localStorage.setItem('selectedSpecies', species);
          } catch {}
        }, [species]);

        useEffect(() => {
          try {
            localStorage.setItem('pfg_segment', segment);
          } catch {
            // Ignore localStorage write errors (e.g., private browsing, quota exceeded)
          }
        }, [segment]);

        useEffect(() => {
          try {
            localStorage.setItem('pfg_water_type', waterType);
          } catch {
            // Ignore localStorage write errors (e.g., private browsing, quota exceeded)
          }
        }, [waterType]);

        useEffect(() => {
          try {
            localStorage.setItem('pfg_active_tab', tab);
          } catch {
            // Ignore localStorage write errors (e.g., private browsing, quota exceeded)
          }
        }, [tab]);

        useEffect(() => {
          const handleScroll = () => setHeaderCompact(window.scrollY > 60);
          window.addEventListener('scroll', handleScroll, { passive: true });
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const loadData = useCallback(async () => {
          setLoading(true);
          setError(null);
          setUsgs(null);
          setForecast(null);
          const w = WATERS[water];
          try {
            const [usgsData, nwsData, usaceData] = await Promise.allSettled([
              fetchUSGSStations(
                riverSection
                  ? getWaterStations(w).map((s) => ({
                      ...s,
                      primary: s.id === riverSection,
                    }))
                  : getWaterStations(w)
              ),
              fetchNWS(w.lat, w.lon),
              fetchUSACESnapshot(water),
            ]);
            const merged =
              usgsData.status === 'fulfilled'
                ? { ...usgsData.value }
                : {
                    temp: null,
                    tempTrend24: null,
                    tempTrend7: null,
                    temps7: [],
                    flow: null,
                    flowTrend24: null,
                    flowTrend7: null,
                    flows7: [],
                    gage: null,
                    gageTrend24: null,
                    gageTrend7: null,
                    gages7: [],
                    lastReading: null,
                    tempSource: null,
                    tempSourceLabel: null,
                    tempSourceNote: null,
                  };

            if (
              usaceData.status === 'fulfilled' &&
              usaceData.value?.status === 'ok'
            ) {
              const u = usaceData.value;
              if (u.currentPowerPool !== null) merged.gage = u.currentPowerPool;
              else if (u.gage !== null) merged.gage = u.gage;
              merged.topFloodPool = u.topFloodPool ?? null;
              merged.currentPowerPool = u.currentPowerPool ?? null;
              merged.feetBelowFloodPool = u.feetBelowFloodPool ?? null;
              if (u.gageTrend24 !== null) merged.gageTrend24 = u.gageTrend24;
              if (u.gageTrend7 !== null) merged.gageTrend7 = u.gageTrend7;
              if (Array.isArray(u.gages7) && u.gages7.length > 0)
                merged.gages7 = u.gages7;
              if (u.flow !== null) merged.flow = u.flow;
              if (u.flowTrend24 !== null) merged.flowTrend24 = u.flowTrend24;
              if (u.flowTrend7 !== null) merged.flowTrend7 = u.flowTrend7;
              if (Array.isArray(u.flows7) && u.flows7.length > 0)
                merged.flows7 = u.flows7;
              if (u.lastReading) merged.lastReading = new Date(u.lastReading);
              merged.levelProvider = u.provider || 'USACE';
              merged.levelSourceUrl = u.sourceUrl || null;
              merged.levelSourceStatus = 'ok';
            } else if (
              usaceData.status === 'fulfilled' &&
              usaceData.value?.status === 'error'
            ) {
              merged.levelProvider = usaceData.value.provider || null;
              merged.levelSourceUrl = usaceData.value.sourceUrl || null;
              merged.levelSourceStatus = 'error';
              merged.topFloodPool = null;
              merged.currentPowerPool = null;
              merged.feetBelowFloodPool = null;
            }

            if (
              !Number.isFinite(merged.temp) &&
              nwsData.status === 'fulfilled'
            ) {
              const est = estimateTempFromForecast(nwsData.value, w.type);
              if (est) {
                merged.temp = est.temp;
                merged.tempTrend24 = est.tempTrend24;
                merged.tempTrend7 = est.tempTrend7;
                merged.temps7 = est.temps7;
                merged.tempSource = est.tempSource;
                merged.tempSourceLabel = est.tempSourceLabel;
                merged.tempSourceNote = est.tempSourceNote;
              }
            }

            if (usgsData.status === 'rejected')
              console.warn('USGS error:', usgsData.reason);
            if (usaceData.status === 'rejected')
              console.warn('USACE snapshot error:', usaceData.reason);
            setUsgs(merged);

            if (nwsData.status === 'fulfilled') setForecast(nwsData.value);
            else console.warn('NWS error:', nwsData.reason);
            if (
              usgsData.status === 'rejected' &&
              nwsData.status === 'rejected' &&
              usaceData.status === 'rejected'
            ) {
              setError(
                'Unable to load live data. Check your connection and try again.'
              );
            }
          } catch (e) {
            setError('Failed to load data. Please try again.');
          }
          setLoading(false);
        }, [water, riverSection]);

        useEffect(() => {
          loadData();
        }, [loadData]);

        const temp = usgs?.temp ?? null;
        const phase = getPhase(temp, species);
        const w = WATERS[water];
        const spawnTrigger = getSpeciesSpawnTrigger(species);
        const triggerDist =
          (temp !== null && Number.isFinite(spawnTrigger))
            ? Math.max(0, spawnTrigger - temp).toFixed(1)
            : null;

        const tabs = TABS;

        const timestamp = usgs?.lastReading
          ? usgs.lastReading.toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
              year: 'numeric',
            }) +
            ' \u00B7 ' +
            usgs.lastReading.toLocaleTimeString('en-US', {
              hour: 'numeric',
              minute: '2-digit',
              timeZoneName: 'short',
            })
          : null;
        const isStale =
          usgs?.lastReading &&
          Date.now() - usgs.lastReading.getTime() > 24 * 60 * 60 * 1000;
        const hoursStale = usgs?.lastReading
          ? Math.round(
              (Date.now() - usgs.lastReading.getTime()) / (60 * 60 * 1000)
            )
          : null;

        const speciesLabel = getSpeciesDisplayName(species);
        const speciesIcon = species === 'cr' ? '\uD83D\uDC1F' : '\uD83D\uDC1F';

        return (
          <>
            <div className={`header${headerCompact ? ' compact' : ''}`}>
              <div className="nav-header">
                <div className="nav-logo">
                <div className="brand">TALE WATERS &amp; TIDES</div>
                <h1>Pocket <span className="pfg-guide">Fishing Guide</span></h1>
              </div>
              <div className="pfg-lake-header">
                <div className="pfg-lake-name">{w.name}</div>
                <div className="pfg-lake-tagline">{w.tagline}</div>
              </div>
              <button className="hamburger-btn" onClick={() => setNavOpen(true)}>
                <span className="hamburger-line"></span>
                <span className="hamburger-line"></span>
                <span className="hamburger-line"></span>
              </button>
            </div>
              {timestamp && (
                <div className="header-meta">
                  Data: {timestamp}
                </div>
              )}
              {isStale && hoursStale && (
                <div className="header-stale">
                  {'\u26A0\uFE0F'} Gauge offline ~{hoursStale}h {'\u00B7'}{' '}
                  showing last known reading
                </div>
              )}
              {w.type === 'river' && w.usgsStations && w.usgsStations.length > 1 && (
                <div>
                  <div className="section-sel">
                    <button
                      className={`section-btn ${riverSection === null ? 'active' : ''}`}
                      onClick={() => setRiverSection(null)}
                    >
                      All Sections
                    </button>
                    {w.usgsStations.map((s) => (
                      <button
                        key={s.id}
                        className={`section-btn ${riverSection === s.id ? 'active' : ''}`}
                        onClick={() => setRiverSection(s.id)}
                      >
                        {stationLocation(s.label)}
                      </button>
                    ))}
                  </div>
                  <div className="section-label">River Section</div>
                </div>
              )}
            </div>
            <NavDrawer
              open={navOpen}
              onClose={() => setNavOpen(false)}
              water={water}
              species={species}
              setSpecies={(s) => { setSpecies(s); trackEvent('select_species', { species: s, water, segment, tab }); }}
              onSelectWater={(key) => { setWater(key); setWaterType(getWaterTaxonomyType(key)); setSegment('all'); setRiverSection(null); trackEvent('select_water', { water: key, species, segment, tab }); }}
            />
            {tab !== 'overview' && (
              <>
                <LakeHero
                  water={water}
                  species={species}
                  setSpecies={(s) => { setSpecies(s); }}
                  segment={segment}
                  setSegment={(s) => { setSegment(s); setRiverSection(getSegmentPrimaryStation(water, s)); }}
                  setWater={(key) => { setWater(key); setWaterType(getWaterTaxonomyType(key)); setSegment('all'); setRiverSection(null); }}
                  waterType={waterType}
                  setWaterType={setWaterType}
                  temp={temp}
                  usgs={usgs}
                  loading={loading}
                  onRefresh={loadData}
                />
                <div className="tabs">
                  {tabs.map((t) => (
                    <div
                      key={t.id}
                      className={`tab ${tab === t.id ? 'active' : ''}`}
                      onClick={() => { setTab(t.id); trackEvent('switch_tab', { tab: t.id, water, species, segment }); }}
                    >
                      <span className="tab-icon">{t.icon}</span>
                      <span className="tab-label">{t.label}</span>
                    </div>
                  ))}
                </div>
              </>
            )}

            <div className="content">
              {error && <ErrorMsg msg={error} onRetry={loadData} />}
              {tab === 'overview' && (
                <OverviewTab
                  species={species}
                  onSelectWater={(key) => {
                    setWater(key);
                    setWaterType(getWaterTaxonomyType(key));
                    setSegment('all');
                    setRiverSection(null);
                    setTab('signals');
                    trackEvent('select_water', { water: key, species, segment, tab: 'signals' });
                  }}
                />
              )}
              {tab === 'signals' && (
                <>
                  {/* ── FULL WATER SIGNALS ── */}
                  <DashboardTab
                    usgs={usgs}
                    forecast={forecast}
                    water={water}
                    species={species}
                    loading={loading}
                  />
                </>
              )}
              {tab === 'forecast' && (
                <ForecastTab forecast={forecast} water={water} species={species} />
              )}
              {tab === 'techniques' && (
                <TechniquesTab temp={temp} water={water} species={species} segment={segment} usgs={usgs} />
              )}
              {tab === 'access' && <AccessTab water={water} />}

              <div className="footer">
                <em>
                  Not a substitute for checking conditions. Fish responsibly.
                </em>{' '}
                {'\uD83C\uDFA3'}
                <details className="data-sources-disclosure">
                  <summary className="data-sources-summary">
                    {'\uD83D\uDD17'} Data Sources
                  </summary>
                  <div className="data-sources-body">
                    <div>
                      <strong>Level/Flow:</strong>{' '}
                      {usgs?.levelProvider || resolveSource(water, 'level')}
                      {' '}
                      <span style={{ color: 'var(--text3)', fontSize: 11 }}>
                        (Source: {getLevelSourceBadge(usgs?.levelProvider, water)})
                      </span>
                    </div>
                    <div>
                      <strong>USGS stations:</strong> {getStationIdsLabel(w)}
                    </div>
                    <div>NWS Office: {w.nwsOffice}</div>
                    {getWaterTaxonomyType(water) === 'tailwater' && (
                      <div style={{ color: 'var(--text3)', fontSize: 11, marginTop: 4 }}>
                        USGS stations listed above are validation context for tailwater flows.
                        Primary flow source is USACE dam operations data.
                      </div>
                    )}
                    {usgs?.lastReading && (
                      <div>Last reading: {usgs.lastReading.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' })}</div>
                    )}
                    {WATERS[water]?.generationScheduleUrl && (
                      <div>
                        <a
                          href={WATERS[water].generationScheduleUrl}
                          target="_blank"
                          rel="noopener"
                          style={{ color: 'var(--accent)', fontSize: 12 }}
                        >
                          Generation Schedule
                        </a>
                        <span style={{ color: 'var(--text3)', fontSize: 11, marginLeft: 6 }}>
                          — Operational schedule may change
                        </span>
                      </div>
                    )}
                  </div>
                </details>
                <div className="support-links">
                  <a
                    className="support-link kofi"
                    href="https://ko-fi.com/coreytheideaguy"
                    target="_blank"
                    rel="noopener"
                  >
                    {'\u2615'} Support on Ko-fi
                  </a>
                  <span className="support-link web">
                    {'\uD83C\uDFA3'} pocketfishinguide.com
                  </span>
                </div>
              </div>
            </div>
            <FeedbackWidget water={water} species={species} tab={tab} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
